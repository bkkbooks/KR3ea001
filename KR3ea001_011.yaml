body:
  text: 卷第十一舉痛論篇第三十九黃帝問曰余聞善言天者必有驗於人善言古者必有合於今善言人者必有厭於己如此則道不惑而要數極所謂明也今余問於夫子令言而可知視而可見捫而可得令驗於己而發蒙解惑可得而聞乎岐伯再拜稽首對曰何道之問也帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人有少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛各不同形別之奈何岐伯曰寒氣客於脈外則脈寒脈寒則縮踡縮踡則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣帝曰所謂言而可知者也視而可見奈何岐伯曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也帝曰捫而可得奈何岐伯曰視其主病之脈堅而血及陷下者皆可捫而得也帝曰善余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開榮衛通汗大泄故氣泄驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出外內皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣腹中論篇第四十黃帝問曰有病心腹滿旦食則不能暮食此為何病岐伯對曰名為鼓脹帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已帝曰其時有復發者何也岐伯曰此飲食不節故時有病也雖然其病且已時故當病氣聚於腹也帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也帝曰治之奈何復以何術岐伯曰以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也帝曰病有少腹盛上下左右皆有根此為何病可治不岐伯曰病名曰伏梁帝曰伏梁何因而得之岐伯曰裹大膿血居腸胃之外不可治治之每切按之致死帝曰何以然岐伯曰此下則因陰必下膿血上則迫胃脘生膈挾胃脘內癰此久病也難治居臍上為逆居臍下為從勿動亟奪論在刺法中帝曰人有身體髀股䯒皆腫環臍而痛是為何病岐伯曰病名伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病帝曰夫子數言熱中消中不可服高梁芳草石藥石藥發癲芳草發狂夫熱中消中者皆富貴人也今禁高梁是不合其心禁芳草石藥是病不愈願聞其說岐伯曰夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者帝曰不可以服此二者何以然岐伯曰夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論帝曰善有病膺腫頸痛胸滿腹脹此為何病何以得之岐伯曰名厥逆帝曰治之奈何岐伯曰灸之則喑石之則狂須其氣並乃可治也帝曰何以然岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則喑石之則陽氣虛虛則狂須其氣並而治之可使全也帝曰善何以知懷子之且生也岐伯曰身有病而無邪脈也帝曰病熱而有所痛者何也岐伯曰病熱者陽脈也以三陽之動也人迎一盛少陽二盛太陽三盛陽明入陰也夫陽入於陰故病在頭與腹乃䐜脹而頭痛也帝曰善刺腰痛篇第四十一足太陽脈令人腰痛引項脊尻背如重狀刺其郤中太陽正經出血春無見血少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧刺少陽成骨之端出血成骨在膝外廉之骨獨起者夏無見血陽明令人腰痛不可以顧顧如有見者善悲刺陽明於䯒前三痏上下和之出血秋無見血足少陰令人腰痛痛引脊內廉刺少陰於內踝上二痏春無見血出血太多不可復也厥陰之脈令人腰痛腰中如張弓弩弦刺厥陰之脈在腨踵魚腹之外循之纍纍然乃刺之其病令人善言默默然不慧刺之三痏解脈令人腰痛痛引肩目䀮䀮然時遺溲刺解脈在膝筋肉分間郤外廉之橫脈出血血變而止解脈令人腰痛如引帶常如折腰狀善恐刺解脈在郤中結絡如黍米刺之血射以黑見赤血而已同陰之脈令人腰痛痛如小錘居其中怫然腫刺同陰之脈在外踝上絶骨之端為三痏陽維之脈令人腰痛痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所衡絡之脈令人腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絶惡血歸之刺之在郤陽筋之間上郤數寸衡居為二痏出血會陰之脈令人腰痛痛上漯漯然汗出汗乾令人欲飲飲已欲走刺直陽之脈上三痏在蹺上郤下五寸橫居視其盛者出血飛陽之脈令人腰痛痛上拂拂然甚則悲以恐刺飛陽之脈在內踝上五寸少陰之前與陰維之會昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言刺內筋為二痏在內踝上大筋前太陰後上踝二寸所散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲刺散脈在膝前骨肉分間絡外廉束脈為三痏肉裡之脈令人腰痛不可以咳咳則筋縮急刺肉裡之脈為二痏在太陽之外少陽絶骨之後腰痛俠脊而痛至頭𠘧𠘧然目䀮䀮欲僵仆刺足太陽郤中出血腰痛上寒刺足太陽陽明上熱刺足厥陰不可以俯仰刺足少陽中熱而喘刺足少陰刺郤中出血腰痛上寒不可顧刺足陽明上熱刺足太陰中熱而喘刺足少陰大便難刺足少陰少腹滿刺足厥陰如折不可以俯仰不可舉刺足太陽引脊內廉刺足少陰腰痛引少腹控䏚不可以仰刺腰尻交者兩髁胂上以月生死為痏數髮針立已左取右右取左舉痛論泣而音澀絀急上丁骨切腹中論鰂昨則切藘茹上力居切下音如脖胦上蒲沒切下鳥郎切喑音陰刺腰痛論厭於豔切髁苦瓦切髎音遼腨踵醜用切蠡溝上盧啓切又落戈切默音黑小錘直垂切漯他合切擷虎結切眇亡表切
