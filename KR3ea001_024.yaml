body:
  text: 卷第二十四陰陽類論篇第七十九孟春始至黃帝燕坐臨觀八極正八風之氣而問雷公曰陰陽之類經脈之道五中所主何臟最貴雷公對曰春甲乙青中主肝治七十二日是脈之主時臣以其臟最貴帝曰卻念上下經陰陽從容子所言貴最其下也雷公致齋七日旦復侍坐帝曰三陽為經二陽為維一陽為遊部此知五臟終始三陰為表二陰為里一陰至絕作朔晦卻具合以正其理雷公曰受業未能明帝曰所謂三陽者太陽為經三陽脈至手太陰弦浮而不沉決以度察以心合之陰陽之論所謂二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死一陽者少陽也至手太陰上連人迎弦急懸不絕此少陽之病也專陰則死三陰者六經之所主也交於太陰伏鼓不浮上空志心二陰至肺其氣歸膀胱外連脾胃一陰獨至經絕氣浮不鼓鉤而滑此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽先至為主後至為客雷公曰臣悉盡意受傳經脈頌得從容之道以合從容不知陰陽不知雌雄帝曰三陽為父二陽為衛一陽為紀三陰為母二陰為雌一陰為獨使二陽一陰陽明主病不勝一陰脈耎而動九竅皆沉三陽一陰太陽脈勝一陰不能止內亂五臟外為驚駭二陰二陽病在肺少陰脈沉勝肺傷脾外傷四肢二陰二陽皆交至病在腎罵詈妄行巔疾為狂二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四肢別離一陰一陽代絕此陰氣至心上下無常出入不知喉咽乾燥病在土脾二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絕浮為血瘕沉為膿胕陰陽皆壯下至陰陽上合昭昭下合冥冥診決死生之期遂合歲首雷公曰請問短期黃帝不應雷公復問黃帝曰在經論中雷公曰請聞短期黃帝曰冬三月之病病合於陽者至春正月脈有死徵皆歸出春冬三月之病在理已盡草與柳葉皆殺春陰陽皆絕期在孟春春三月之病曰陽殺陰陽皆絕期在草乾夏三月之病至陰不過十日陰陽交期在溓水秋三月之病三陽俱起不治自已陰陽交合者立不能坐坐不能起三陽獨至期在石水二陰獨至期在盛水方盛衰論篇第八十雷公請問氣之多少何者為逆何者為從黃帝答曰陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣多少逆皆為厥問曰有餘者厥耶答曰一上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛巔疾求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日是以少氣之厥令人妄夢其極至迷三陽絕三陰微是為少氣是以肺氣虛則使人夢見白物見人斬血藉藉得其時則夢見兵戰腎氣虛則使人夢見舟船溺人得其時則夢伏水中若有畏恐肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起心氣虛則夢救火陽物得其時則夢燔灼脾氣虛則夢飲食不足得其時則夢築垣蓋屋此皆五臟氣虛陽氣有餘陰氣不足合之五診調之陰陽以在經脈診有十度度人脈度臟度肉度筋度俞度陰陽氣盡人病自具脈動無常散陰頗陽脈脫不具診無常行診必上下度民君卿受師不卒使術不明不察逆從是為妄行持雌失雄棄陰附陽不知併合診故不明傳之後世反論自章至陰虛天氣絕至陽盛地氣不足陰陽並交至人之所行陰陽並交者陽氣先至陰氣後至是以聖人持診之道先後陰陽而持之奇恆之勢乃六十首診合微之事追陰陽之變章五中之情其中之論取虛實之要定五度之事知此乃足以診是以切陰不得陽診消亡得陽不得陰守學不湛知左不知右知右不知左知上不知下知先不知後故治不久知醜知善知病知不病知高知下知坐知起知行知止用之有紀診道乃具萬世不殆起所有餘知所不足度事上下脈事因格是以形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生是以診有大方坐起有常出入有行以轉神明必清必淨上觀下觀司八正邪別五中部按脈動靜循尺滑澀寒溫之意視其大小合之病能逆從以得復知病名診可十全不失人情故診之或視息視意故不失條理道甚明察故能長久不知此道失經絕理亡言妄期此謂失道解精微論篇第八十一黃帝在明堂雷公請曰臣授業傳之行教以經論從容形法陰陽刺灸湯藥所滋行治有賢不肖未必能十全若先言悲哀喜怒燥濕寒暑陰陽婦女請問其所以然者卑賤富貴人之形體所從群下通使臨事以適道術謹聞命矣請問有𭀰愚仆漏之問不在經者欲聞其狀帝曰大矣公請問哭泣而淚不出者若出而少涕其故何也帝曰在經有也復問不知水所從生涕所從出也帝曰若問此者無益於治也工之所知道之所生也夫心者五臟之專精也目者其竅也華色者其榮也是以人有德也則氣和於目有亡憂知於色是以悲哀則泣下泣下水所由生水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也夫水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺言曰心悲名曰志悲志與心精共湊於目也是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也泣涕者腦也腦者陰也髓者骨之充也故腦滲為涕志者骨之主也是以水流而涕從之者其行類也夫涕之與泣者譬如人之兄弟急則俱死生則俱生其志以早悲是以涕泣俱出而橫行也夫人涕泣俱出而相從者所屬之類也雷公曰大矣請問人哭泣而淚不出者若出而少涕不從之何也帝曰夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也且子獨不誦不念夫經言乎厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲是以衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫火疾風生乃能雨此之類也陰陽類論溓音廉方盛衰論菌祛倫切解精微論𭀰士銜切湊粗勾切
