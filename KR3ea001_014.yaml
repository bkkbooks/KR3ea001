body:
  text: 卷第十四刺要論篇第五十黃帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病溫瘧溯溯然寒栗刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食刺肉無傷脈脈傷則內動心心動則夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛刺骨無傷髓髓傷則銷鑠胻痠體解㑊然不去矣刺齊論篇第五十一黃帝問曰願聞刺淺深之分岐伯對曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨帝曰余未知其所謂願聞其解岐伯曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也此之謂反也刺禁論篇第五十二黃帝問曰願聞禁數岐伯對曰臟有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市膈肓之上中有父母七節之旁中有小心從之有福逆之有咎刺中心一日死其動為噫刺中肝五日死其動為語刺中腎六日死其動為嚏刺中肺三日死其動為咳刺中脾十日死其動為吞刺中膽一日半死其動為嘔刺跗上中大脈血出不止死刺面中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中脈太過血出不止為喑刺足下布絡中脈血不出為腫刺郤中大脈令人僕脫色刺氣街中脈血不出為腫鼠僕刺脊間中髓為傴刺乳上中乳房為腫根蝕刺缺盆中內陷氣泄令人喘咳逆刺手魚腹內陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝臏出液為跛刺臂太陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中肺為喘逆仰息刺肘中內陷氣歸之為不屈伸刺陰股下三寸內陷令人遺溺刺掖下脅間內陷令人咳刺少腹中膀胱溺出令人少腹滿刺踹腸內陷為腫刺匡上陷骨中脈為漏為盲刺關節中液出不得屈伸刺志論篇第五十三黃帝問曰願聞虛實之要岐伯對曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病帝曰如何而反岐伯曰氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈小血多此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者左手開針空也入虛者左手閉針空也針解篇第五十四黃帝問曰願聞九針之解虛實之道岐伯對曰刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也邪勝則虛之者出針勿按徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之言實與虛者寒溫氣多少也若無若有者疾不可知也察後與先者知病先後也為虛與實者工勿失其法若得若失者離其法也虛實之要九針最妙者為其各有所宜也補瀉之時者與氣開闔相合也九針之名各不同形者針窮其所當補瀉也刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至慎守勿失者勿變更也深淺在志者知病之內外也近遠如一者深淺其候等也如臨深淵者不敢惰也手如握虎者欲其壯也神無營於衆物者靜志觀病人無左右視也義無邪下者欲端以正也必正其神者欲瞻病人目制其神令氣易行也所謂三里者下膝三寸也所謂跗之者舉膝分易見也巨虛者蹺足䯒獨陷者下廉者陷下者也帝曰余聞九針上應天地四時陰陽願聞其方令可傳於後世以為常也岐伯曰夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針人皮應天人肉應地人脈應人人筋應時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應野故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也人心意應八風人氣應天人發齒耳目五聲應五音六律人陰陽脈血氣應地人肝目應之九九竅三百六十五人一以觀動靜天二以候五色七星應之以候發毋澤五音一以候宮商角徵羽六律有餘不足應之二地一以候高下有餘九野一節俞應之以候閉節三人變一分人候齒泄多血少十分角之變五分以候緩急六分不足三分寒關節第九分四時人寒溫燥濕四時一應之以候相反一四方各作解長刺節論篇第五十五刺家不診聽病者言在頭頭疾痛為藏針之刺至骨病已上無傷骨肉及皮皮者道也陰刺入一旁四處治寒熱深專者刺大藏迫藏刺背背俞也刺之迫藏藏會腹中寒熱去而止與刺之要髮針而淺出血治腐腫者刺腐上視癰小大深淺刺刺大者多血小者深之必端內針為故止病在少腹有積刺皮𩩻以下至少腹而止刺挾脊兩旁四椎間刺兩髂髎季脅肋間導腹中氣熱下已病在少腹腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰髁骨間刺而多之盡炅病已病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也病起筋炅病已止病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分多髮針而深之以熱為故無傷筋骨傷筋骨痛發若變諸分盡熱病已止病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹深者刺無傷脈肉為故其道大分小分骨熱病已止病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脈其無寒者以針調之病已止病風且寒且熱炅汗出一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針刺要論泝音素弛施是切鑠詩若切眩音縣刺齊論解胡買切刺禁論臏音牝刺志論脫土活切捻音涅針解論匙音低長刺節論䯏光抹切篡初患切
