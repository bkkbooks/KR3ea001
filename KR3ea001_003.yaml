body:
  text: 卷第三靈蘭祕典論篇第八黃帝問曰願聞十二臟之相使貴賤何如岐伯對曰悉乎哉問也請遂言之心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安以此養生則壽歿世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之至道在微變化無窮孰知其原窘乎哉消者瞿瞿孰知其要閔閔之當孰者為良恍惚之數生於毫犛毫犛之數起於度量千之萬之可以益大推之大之其形乃制黃帝曰善哉余聞精光之道大聖之業而宣明大道非齋戒擇吉日不敢受也黃帝乃擇吉日良兆而藏靈蘭之室以傳保焉六節藏象論篇第九黃帝問曰余聞天以六六之節以成一歲人以九九制會計人亦有三百六十五節以為天地久矣不知其所謂也岐伯對曰昭乎哉問也請遂言之夫六六之節九九制會者所以正天之度氣之數也天度者所以制日月之行也氣數者所以紀化生之用也天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣余而盈閏矣立端於始表正於中推余於終而天度畢矣帝曰余已聞天度矣願聞氣數何以合之岐伯曰天以六六為節地以九九制會天有十日日六竟而周甲甲六復而終歲三百六十日法也夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣故其生五其氣三三而成天三而成地三而成人三而三之合則為九九分為九野九野為九藏故形藏四神藏五合為九藏以應之也帝曰余已聞六六九九之會也夫子言積氣盈閏願聞何謂氣請夫子發蒙解惑焉岐伯曰此上帝所祕先師傳之也帝曰請遂聞之岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法故曰不知年之所加氣之盛衰虛實之所起不可以為工矣帝曰五運之始如環無端其太過不及何如岐伯曰五氣更立各有所勝盛虛之變此其常也帝曰平氣何如岐伯曰無過者也帝曰太過不及奈何岐伯曰在經有也帝曰何謂所勝岐伯曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其臟帝曰何以知其勝岐伯曰求其至也皆歸始春未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫不分邪僻內生工不能禁至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫所謂求其至者氣至之時也謹候其時氣可與期失時反候五治不分邪僻內生工不能禁也帝曰有不襲乎岐伯曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣帝曰非常而變奈何岐伯曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也帝曰善余聞氣合而有形因變以正名天地之運陰陽之化其於萬物孰少孰多可得聞乎岐伯曰悉哉問也天至廣不可度地至大不可量大神靈問請陳其方草生五色五色之變不可勝視草生五味五味之美不可勝極嗜欲不同各有所通天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生帝曰臟象何如岐伯曰心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此為陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一臟取決於膽也故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣五臟生成篇第十心之合脈也其榮色也其主腎也肺之合皮也其榮毛也其主心也肝之合筋也其榮爪也其主肺也脾之合肉也其榮唇也其主肝也腎之合骨也其榮發也其主脾也是故多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所合也五臟之氣故色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺此四肢八溪之朝夕也故人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝臥出而風吹之血凝於膚者為痹凝於脈者為泣凝於足者為厥此三者血行而不得反其空故為痹厥也人有大谷十二分小溪三百五十四名少十二俞此皆衛氣之所留止邪氣之所客也針石緣而去之診病之始五決為紀欲知其始先建其母所謂五決者五脈也是以頭痛巔疾下虛上實過在足少陰巨陽甚則入腎徇蒙招尤目冥耳聾下實上虛過在足少陽厥陰甚則入肝腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明咳嗽上氣厥在胸中過在手陽明太陰心煩頭痛病在膈中過在手巨陽少陰夫脈之小大滑澀浮沉可以指別五臟之象可以類推五臟相音可以意識五色微診可以目察能合脈色可以萬全赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也五臟別論篇第十一黃帝問曰余聞方士或以腦髓為臟或以腸胃為臟或以為腑敢問更相反皆自謂是不知其道願聞其説岐伯對曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五臟使水穀不得久藏所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也凡治病必察其下適其脈觀其志意與其病也拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣靈蘭祕典論膻徒旱切廩力稔切瘠音籍瞿音劬六節藏象論僦即就切溲所鳩切小便也五臟生成論胝䐢上丁尼切下側救切炲音苔衃芳杯切𤸷音頑又音君隧音遂頏胡浪切顙蘇朗切系奚帝切顴音權胠去魚切髃音虞五臟別論楯音巡惡音汙
