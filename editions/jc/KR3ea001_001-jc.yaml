body:
  text: 卷第一上古天真論篇第一昔在黃帝生而神靈弱而能言幼而徇齊長而敦敏成而登天乃問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶岐伯對曰上古之人其知道者法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬惔虛無真氣從之精神內守病安從來是以志閒而少欲心安而不懼形勞而不倦氣從以順各從其欲皆得所願故美其食任其服樂其俗高下不相慕其民故曰樸是以嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物故合於道所以能年皆度百歲而動作不衰者以其德全不危也帝曰人年老而無子者材力盡邪將天數然也岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子三七腎氣平均故真牙生而長極四七筋骨堅髮長極身體盛壯五七陽明脈衰面始焦發始墮六七三陽脈衰於上面皆焦發始白七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也丈夫八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨勁強故真牙生而長極四八筋骨隆盛肌肉滿壯五八腎氣衰發墮齒槁六八陽氣衰竭於上面焦髮鬢頒白七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極八八則齒髮去腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋骨解墮天癸盡矣故髮鬢白身體重行步不正而無子耳帝曰有其年已老而有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣帝曰夫道者年皆百數能有子乎岐伯曰夫道者能卻老而全形身年雖壽能生子也黃帝曰余聞上古有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一故能壽敝天地無有終時此其道生中古之時有至人者淳德全道和於陰陽調於四時去世離俗積精全神遊行天地之間視聽八達之外此蓋益其壽命而強者也亦歸於真人其次有聖人者處天地之和從八風之理適嗜欲於世俗之間無恚嗔之心行不欲離於世被服章舉不欲觀於俗外不勞形於事內無思想之患以恬愉為務以自得為功形體不敝精神不散亦可以百數其次有賢人者法則天地象似日月辯列星辰逆從陰陽分別四時將從上古合同於道亦可使益壽而有極時四氣調神大論篇第二春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺予而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少天氣清淨光明者也藏德不止故不下也天明則日月不明邪害空竅陽氣者閉塞地氣者冒明雲霧不精則上應白露不下交通不表萬物命故不施不施則名木多死惡氣不發風雨不節白露不下則菀槁不榮賊風數至暴雨數起天地四時不相保與道相失則未央絕滅唯聖人從之故身無奇病萬物不失生氣不竭逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物沉浮於生長之門逆其根則伐其本壞其真矣故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則苛疾不起是謂得道道者聖人行之愚者佩之從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄錐不亦晚乎生氣通天論篇第三黃帝曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣其生五其氣三數犯此者則邪氣傷人此壽命之本也蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陽氣者若天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也因於寒欲如運樞起居如驚神氣乃浮因於暑汗煩則喘喝靜則多言體若燔炭汗出而散因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫四維相代陽氣乃竭陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止陽氣者大怒則形氣絕而血菀於上使人薄厥有傷於筋縱其若不容汗出偏沮使人偏枯汗出見濕乃生痤痱高粱之變足生大丁受如持虛勞汗當風寒薄為皶郁乃痤陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠俞氣化薄傳為善畏及為驚駭營氣不從逆於肉理乃生癰腫魄汗未盡形弱而氣爍穴俞以閉發為風瘧故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也故病久則傳化上下不並良醫弗為故陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之故陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄岐伯曰陰者藏精而起亟也陽者衛外而為固也陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從如是則內外調和邪不能害耳目聰明氣立如故風客淫氣精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔因而大飲則氣逆因而強力腎氣乃傷高骨乃壞凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是謂聖度故陽強不能密陰氣乃絕陰平陽秘精神乃治陰陽離決精氣乃絕因於露風乃生寒熱是以春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟陰之所生本在五味陰之五宮傷在五味是故味過於酸肝氣以津脾氣乃絕味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命金匱真言論篇第四黃帝問曰天有八風經有五風何謂岐伯對曰八風發邪以為經風觸五臟邪氣發病所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央為土病在脾俞在脊故春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧冬善病痹厥故冬不按蹺春不鼽衄春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也夫精者身之本也故藏於精者春不病溫夏暑汗不出者秋成風瘧此平人脈法也故曰陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽所以欲知陰中之陰陽中之陽者何也為冬病在陰夏病在陽春病在陰秋病在陽皆視其所在為施針石也故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也帝曰五臟應四時各有收受乎岐伯曰有東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歲星是以春氣在頭也其音角其數八是以知病之在筋也其臭臊南方赤色入通於心開竅於耳藏精於心故病在五臟其味苦其類火其畜羊其谷黍其應四時上為熒惑星是以知病之在脈也其音徵其數七其臭焦中央黃色入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷其應四時上為鎮星是以知病之在肉也其音宮其數五其臭香西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥北方黑色入通於腎開竅於二陰藏精於腎故病在溪其味鹹其類水其畜彘其谷豆其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐故善為脈者謹察五臟六腑一逆一從陰陽表裡雌雄之紀藏之心意合心於精非其人勿教非其真勿授是謂得道序乃其上音乃蕆敕輦切糅女救切雜也瀅音瑩上古天真論徇徐閏切病也痹必至切恬憺上啼廉切下音淡更齒上古行切下齒更同頞於葛切俠口胡夾切下同額顱落胡切滲灌上所禁切解惰上上聲壽敝毗祭切眉睫音接恚嗔上於桂切愉音俞四氣調神大論予而上音與獺他達切鴽音如鶉也蕃秀上音煩螻蟈上音樓下古獲切蛙也蚯蚓上音丘下以志切鵙古闃切搏勞鳥也蜩音條溽暑上音辱痎音皆瘦瘧也欲熾尺志切壞戶上步回切始涸胡各切豺音柴亟奪上去吏切鶡苦割切荔挺上力計切下大頂切北鄉音向雊古豆切雉鳴為否符鄙切下不交否同燠熱上於六切生氣通天論分上聲暴卒倉沒切荒佚音逸躁則到切喝呼葛切瘀衣倨切裹攘汝陽切緛音軟縮也潰潰古沒切煩悶不止也眥在計切又前計切奔並下去聲偏沮子魚切潤也痤昨禾切痱方味切怫符弗切皶織加切稸許竹切瘈尺制切爇而劣切大僂力主切瘻力鬥切癰瘻瘍音陽下並同俞音庶否隔符鄙切塞也粗千胡切淖奴教切下並同腸澼普擊切決憊蒲拜切癃音隆金匱真言論鼽音求按蹺音腳燔灼上音煩彘直利切
