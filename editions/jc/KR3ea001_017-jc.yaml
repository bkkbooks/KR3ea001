body:
  text: 卷第十七調經論篇第六十二黃帝問曰余聞刺法言有餘瀉之不足補之何謂有餘何謂不足岐伯對曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也帝曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎岐伯曰皆生於五臟也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形志意通內連骨髓而成身形五臟五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉帝曰神有餘不足何如岐伯曰神有餘則笑不休神不足則悲血氣未並五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微帝曰補瀉奈何岐伯曰神有餘則瀉其小絡之血出血勿之深斥無中其大經神氣乃平神不足者視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平帝曰刺微奈何岐伯曰按摩勿釋著針勿斥移氣於不足神氣乃得復帝曰善有餘不足奈何岐伯曰氣有餘則喘咳上氣不足則息利少氣血氣未並五臟安定皮膚微病命曰白氣微泄帝曰補瀉奈何岐伯曰氣有餘則瀉其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣帝曰刺微奈何岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐血氣未並五臟安定孫絡外溢則經有留血帝曰補瀉奈何岐伯曰血有餘則瀉其盛經出其血不足則視其虛經內針其脈中久留而視脈大疾出其針無令血泄帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四肢不用血氣未並五臟安定肌肉蠕動命曰微風帝曰補瀉奈何岐伯曰形有餘則瀉其陽經不足則補其陽絡帝曰刺微奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥血氣未並五臟安定骨節有動帝曰補瀉奈何岐伯曰志有餘則瀉然筋血者不足則補其復溜帝曰刺未並奈何岐伯曰即取之無中其經邪所乃能立虛帝曰善余已聞虛實之形不知其何以生岐伯曰氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中血並於上氣並於下心煩惋善怒血並於下氣並於上亂而喜忘帝曰血並於陰氣並於陽如是血氣離居何者為實何者為虛岐伯曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之是故氣之所併為血虛血之所併為氣虛帝曰人之所有者血與氣耳今夫子乃言血併為虛氣併為虛是無實乎岐伯曰有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉絡之與孫脈俱輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死帝曰實者何道從來虛者何道從去虛實之要願聞其故岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛帝曰善陰之生實奈何岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣帝曰陰之生虛奈何岐伯曰喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒慄帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒帝曰陰與陽並血氣以並病形以成刺之奈何岐伯曰刺此者取之經隧取血於營取氣於衛用形哉因四時多少高下帝曰血氣以並病形以成陰陽相傾補瀉奈何岐伯曰瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃屈帝曰補虛奈何岐伯曰持針勿置以定其意候呼內針氣出針入針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之帝曰夫子言虛實者有十生於五臟五臟五脈耳夫十二經脈皆生其病今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之岐伯曰五臟者故得六腑與為表裡經絡支節各生虛實其病所居隨而調之病在脈調之血病在血調之絡病在氣調之衛病在肉調之分肉病在筋調之筋病在骨調之骨燔針劫刺其下及與急者病在骨淬針藥熨病不知所痛兩蹺為上身形有痛九候莫病則繆刺之痛在於左而右脈病者巨刺之必謹察其九候針道備矣調經論隧音遂飧音孫燔音煩
