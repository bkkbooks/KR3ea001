body:
  text: 卷第十五皮部論篇第五十六黃帝問曰余聞皮有分部脈有經紀筋有結絡骨有度量其所生病各異別其分部左右上下陰陽所在病之始終願聞其道岐伯對曰欲知皮部以經脈為紀者諸經皆然陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內少陽之陽名曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然太陽之陽名曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡十二經絡脈者皮之部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃邪之始入於皮也泝然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗帝曰夫子言皮之十二部其生病皆何如岐伯曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也帝曰善經絡論篇第五十七黃帝問曰夫絡脈之見也其五色各異青黃赤白黑不同其故何也岐伯對曰經有常色而絡無常變也帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也帝曰絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病五色具見者謂之寒熱帝曰善氣穴論篇第五十八黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之岐伯稽首再拜對曰窘乎哉問也其非聖帝孰能窮其道焉因請溢意盡言其處帝捧手逡巡而卻曰夫子之開余道也目未見其處耳未聞其數而目以明耳以聰矣岐伯曰此所謂聖人易語良馬易御也帝曰余非聖人之易語也世言真數開人意今余所訪問者真數發蒙解惑未足以論也然余願聞夫子溢志盡言其處令解其意請藏之金匱不敢復出岐伯再拜而起曰臣請言之背與心相控而痛所治天突與十椎及上紀上紀者胃脘也下紀者關元也背胸邪系陰陽左右如此其病前後痛澀胸脅痛而不得息不得臥上氣短氣偏痛脈滿起斜出尻脈絡胸脅支心貫膈上肩加天突斜下肩交十椎下臟俞五十穴腑俞七十二穴熱俞五十九穴水俞五十七穴頭上五行行五五五二十五穴中𦛗兩旁各五凡十穴大椎上兩旁各一凡二穴目瞳子浮白二穴兩髀厭分中二穴犢鼻二穴耳中多所聞二穴眉本二穴完骨二穴項中央一穴枕骨二穴上關二穴大迎二穴下關二穴天柱二穴巨虛上下廉四穴曲牙二穴天突一穴天府二穴天牖二穴扶突二穴天窗二穴肩解二穴關元一穴委陽二穴肩貞二穴喑門一穴臍一穴胸俞十二穴背俞二穴膺俞十二穴分肉二穴踝上橫二穴陰陽蹺四穴水俞在諸分熱俞在氣穴寒熱俞在兩骸厭中二穴大禁二十五在天府下五寸凡三百六十五穴針之所由行也帝曰余已知氣穴之處遊針之居願聞孫絡溪谷亦有所應乎岐伯曰孫絡三百六十五穴會亦以應一歲以溢奇邪以通榮衛榮衛稽留衛散榮溢氣竭血著外為發熱內為少氣疾瀉無怠以通榮衛見而瀉之無問所會帝曰善願聞溪谷之會也岐伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿內銷骨髓外破大膕留於節湊必將為敗積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也溪谷三百六十五穴會亦應一歲其小痹淫溢循脈往來微針所及與法相同帝乃闢左右而起再拜曰今日發蒙解惑藏之金匱不敢復出乃藏之金蘭之室署曰氣穴所在岐伯曰孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二絡脈非獨十四絡脈也內解瀉於中者十脈氣府論篇第五十九足太陽脈氣所發者七十八穴兩眉頭各一入發至項三寸半旁五相去三寸其浮氣在皮中者凡五行行五五五二十五項中大筋兩旁各一風府兩旁各一挾脊以下至尻尾二十一節十五間各一五臟之俞各五六腑之俞各六委中以下至足小指旁各六俞足少陽脈氣所發者六十二穴兩角上各二直目上髮際內各五耳前角上各一耳前角下各一銳發下各一客主人各一耳後陷中各一下關各一耳下牙車之後各一缺盆各一掖下三寸脅下至胠八間各一髀樞中旁各一膝以下至足小指次指各六俞足陽明脈氣所發者六十八穴額顱髮際旁各三面鼽骨空各一大迎之骨空各一人迎各一缺盆外骨空各一膺中骨間各一挾鳩尾之外當乳下三寸挾胃脘各五挾臍廣三寸各三下臍二寸挾之各三氣街動脈各一伏兔上各一三里以下至足中指各八俞分之所在穴空手太陽脈氣所發者三十六穴目內眥各一目外各一鼽骨下各一耳郭上各一耳中各一巨骨穴各一曲掖上骨穴各一柱骨上陷者各一上天窗四寸各一肩解各一肩解下三寸各一肘以下至手小指本各六俞手陽明脈氣所發者二十二穴鼻空外廉項上各二大迎骨空各一柱骨之會各一髃骨之會各一肘以下至手大指次指本各六俞手少陽脈氣所發者三十二穴鼽骨下各一眉後各一角上各一下完骨後各一項中足太陽之前各一挾扶突各一肩貞各一肩貞下三寸分間各一肘以下至手小指次指本各六俞督脈氣所發者二十八穴項中央二髮際後中八面中三大椎以下至尻尾及旁十五穴至骶下凡二十一節脊椎法也任脈之氣所發者二十八穴喉中央二膺中骨陷中各一鳩尾下三寸胃脘五寸胃脘以下至橫骨六寸半一腹脈法也下陰別一目下各一下唇一齦交一衝脈氣所發者二十二穴挾鳩尾外各半寸至臍寸一挾臍下旁各五分至橫骨寸一腹脈法也足少陰舌下厥陰毛中急脈各一手少陰各一陰陽蹺各一手足諸魚際脈氣所發者凡三百六十五穴也皮部論蜚扶沸切䐃渠殞切氣穴論蔽必寐切擿音摘臑奴到切氣府論囟音信譩譆上音衣下音喜顳顬上如輒切下汝車切毖音秘㼌音仇
