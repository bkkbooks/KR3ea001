司化之常也厥陰所至為生為風搖少陰所至為榮為形見太陰所至為化為雲雨少陽所至為長為番鮮陽明所至為收為霧露太陽所至為藏為周密氣化之常也厥陰所至為風生終為肅少陰所至為熱生中為寒太陰所至為濕生終為注雨少陽所至為火生終為蒸溽陽明所至為燥生終為涼太陽所至為寒生中為溫德化之常也厥陰所至為毛化少陰所至為羽化太陰所至為倮化少陽所至為羽化陽明所至為介化太陽所至為鱗化德化之常也厥陰所至為生化少陰所至為榮化太陰所至為濡化少陽所至為茂化陽明所至為堅化太陽所至為藏化布政之常也厥陰所至為飄怒大涼少陰所至為大暄寒太陰所至為雷霆驟注烈風少陽所至為飄風燔燎霜凝陽明所至為散落溫太陽所至為寒雪冰雹白埃氣變之常也厥陰所至為撓動為迎隨少陰所至為高明焰為曛太陰所至為沉陰為白埃為晦暝少陽所至為光顯為彤雲為曛陽明所至為煙埃為霜為勁切為淒鳴太陽所至為剛固為堅芒為立令行之常也厥陰所至為裡急少陰所至為瘍胗身熱太陰所至為積飲痞隔少陽所至為嚏嘔為瘡瘍陽明所至為浮虛太陽所至為屈伸不利病之常也厥陰所至為支痛少陰所至為驚惑惡寒戰慓譫妄太陰所至為稸滿少陽所至為驚躁瞀昧暴病陽明所至為鼽尻陰股膝髀腨䯒足病太陽所至為腰痛病之常也厥陰所至為緛戾少陰所至為悲妄衄衊太陰所至為中滿霍亂吐下少陽所至為喉痹耳鳴嘔湧陽明所至為皴揭太陽所至為寢汗痙病之常也厥陰所至為脅痛嘔泄少陰所至為語笑太陰所至為重胕腫少陽所至為暴注瞤瘛暴死陽明所至為鼽嚏太陽所至為流泄禁止病之常也凡此十二變者報德以德報化以化報政以政報令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外位之常也故風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫隨氣所在以言其變耳帝曰願聞其用也岐伯曰夫六氣之用各歸不勝而為化故太陰雨化施於太陽太陽寒化施於少陰少陰熱化施於陽明陽明燥化施於厥陰厥陰風化施於太陰各命其所在以徵之也帝曰自得其位何如岐伯曰自得其位常化也帝曰願聞所在也岐伯曰命其位而方月可知也帝曰六位之氣盈虛何如岐伯曰太少異也太者之至徐而常少者暴而亡帝曰天地之氣盈虛何如岐伯曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也惡所不勝歸所同和隨運歸從而生其病也故上勝則天氣降而下下勝則地氣遷而上多少而差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分微紀七分其差可見此之謂也帝曰善論言熱無犯熱寒無犯寒余欲不遠寒不遠熱奈何岐伯曰悉乎哉問也發表不遠熱攻裡不遠寒帝曰不發不攻而犯寒犯熱何如岐伯曰寒熱內賊其病益甚帝曰願聞無病者何如岐伯曰無者生之有者甚之帝曰生者何如岐伯曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閟之病生矣帝曰治之奈何岐伯曰時必順之犯者治以勝也黃帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其太半而止過者死帝曰善郁之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之帝曰假者何如岐伯曰有假其氣則無禁也所謂主氣不足客氣勝也帝曰至哉聖人之道天地大化運行之節臨御之紀陰陽之政寒暑之令非夫子孰能通之請藏之靈蘭之室署曰六元正紀非齋戒不敢示慎傳也六元正紀大論憒音會矇音蒙憹奴董切翮胡革切痙巨郢切刺法論篇第七十二黃帝問曰升降不前氣交有變即成暴郁余已知之如何預救生靈可得卻乎岐伯稽首再拜對曰昭乎哉問臣聞夫子言既明天元須窮法刺可以折郁扶運補弱全真瀉盛蠲余令除斯苦帝曰願卒聞之岐伯曰升之不前即有甚凶也木欲升而天柱窒抑之木欲發郁亦須待時當刺足厥陰之井火欲升而天蓬窒抑之火欲發郁亦須待時君火相火同刺包絡之滎土欲升而天衝窒抑之土欲發郁亦須待時當刺足太陰之俞金欲升而天英窒抑之金欲發郁亦須待時當刺手太陰之經水欲升而天芮窒抑之水欲發郁亦須待時當刺足少陰之合帝曰升之不前可以預備願聞其降可以先防岐伯曰既明其升必達其降也升降之道皆可先治也木欲降而地晶窒抑之降而不入抑之郁發散而可得位降而鬱發暴如天間之待時也降而不下郁可速矣降可折其所勝也當刺手太陰之所出刺手陽明之所入火欲降而地玄窒抑之降而不入抑之郁發散而可矣當折其所勝可散其鬱當刺足少陰之所出刺足太陽之所入土欲降而地蒼窒抑之降而不下抑之郁發散而可入當折其勝可散其鬱當刺足厥陰之所出刺足少陽之所入金欲降而地彤窒抑之降而不下抑之郁發散而可入當折其勝可散其鬱當刺心包絡所出刺手少陽所入也水欲降而地阜窒抑之降而不下抑之郁發散而可入當折其土可散其鬱當刺足太陰之所出刺足陽明之所入帝曰五運之至有前後與升降往來有所承抑之可得聞乎刺法岐伯曰當取其化源也是故太過取之不及資之太過取之次抑其鬱取其運之化源令折鬱氣不及扶資以扶運氣以避虛邪也資取之法令出密語黃帝問曰升降之刺以知其要願聞司天未得遷正使司化之失其常政即萬化之或其皆妄然與民為病可得先除欲濟群生願聞其說岐伯稽首再拜曰悉乎哉問言其至理聖念慈憫欲濟群生臣乃盡陳斯道可申洞微太陽復布即厥陰不遷正不遷正氣塞於上當瀉足厥陰之所流厥陰復布少陰不遷正不遷正即氣塞於上當刺心包絡脈之所流少陰復布太陰不遷正不遷正即氣留於上當刺足太陰之所流太陰復布少陽不遷正不遷正則氣塞未通當刺手少陽之所流少陽復布則陽明不遷正不遷正則氣未通上當刺手太陰之所流陽明覆布太陽不遷正不遷正則復塞其氣當刺足少陰之所流帝曰遷正不前以通其要願聞不退欲折其餘無令過失可得明乎岐伯曰氣過有餘復作布正是名不退位也使地氣不得後化新司天未可遷正故復布化令如故也巳亥之歲天數有餘故厥陰不退位也風行於上木化布天當刺足厥陰之所入子午之歲天數有餘故少陰不退位也熱行於上火余化布天當刺手厥陰之所入丑未之歲天數有餘故太陰不退位也濕行於上雨化布天當刺足太陰之所入寅申之歲天數有餘故少陽不退位也熱行於上火化布天當刺手少陽之所入卯酉之歲天數有餘故陽明不退位也金行於上燥化布天當刺手太陰之所入辰戌之歲天數有餘故太陽不退位也寒行於上凜水化布天當刺足少陰之所入故天地氣逆化成民病以法刺之預可平痾黃帝問曰剛柔二干失守其位使天運之氣皆虛乎與民為病可得平乎岐伯曰深乎哉問明其奧旨天地迭移三年化疫是謂根之可見必有逃門假令甲子剛柔失守剛未正柔孤而有虧時序不令即音律非從如此三年變大疫也詳其微甚察其淺深欲至而可刺刺之當先補腎俞次三日可刺足太陰之所注又有下位己卯不至而甲子孤立者次三年作土癘其法補瀉一如甲子同法也其刺以畢又不須夜行及遠行令七日潔清淨齋戒所有自來腎有久病者可以寅時面向南淨神不亂思閉氣不息七遍以引頸嚥氣順之如咽甚硬物如此七遍後餌舌下津令無數假令丙寅剛柔失守上剛乾失守下柔不可獨主之中水運非太過不可執法而定之布天有餘而失守上正天地不合即律呂音異如此即天運失序後三年變疫詳其微甚差有大小徐至即後三年至甚即首三年當先補心俞次五日可刺腎之所入又有下位地甲子辛巳柔不附剛亦名失守即地運皆虛後三年變水癘即刺法皆如此矣其刺如畢慎其大喜欲情於中如不忌即其氣復散也令靜七日心欲實令少思假令庚辰剛柔失守上位失守下位無合乙庚金運故非相招布天未退中運勝來上下相錯謂之失守姑洗林鐘商音不應也如此則天運化易三年變大疫詳其天數差有微甚微即微三年至甚即甚三年至當先補肝俞次三日可刺肺之所行刺畢可靜神七日慎勿大怒怒必真氣卻散之又或在下地甲子乙未失守者即乙柔干即上庚獨治之亦名失守者即天運孤主之三年變癘名曰金癘其至待時也詳其地數之等差亦推其微甚可知遲速爾諸位乙庚失守刺法同肝欲平即勿怒假令壬午剛柔失守上壬未遷正下丁獨然即雖陽年虧及不同上下失守相招其有期差之微甚各有其數也律呂二角失而不和同音有日微甚如見三年大疫當刺脾之俞次三日可刺肝之所出也刺畢靜神七日勿大醉歌樂其氣復散又勿飽食勿食生物欲令脾實氣無滯飽無久坐食無太酸無食一切生物宜甘宜淡又或地下甲子丁酉失守其位未得中司即氣不當位下不與壬奉合者亦名失守非名合德故柔不附剛即地運不合三年變癘其刺法一如木疫之法假令戊申剛柔失守戊癸雖火運陽年不太過也上失其剛柔地獨主其氣不正故有邪干迭移其位差有淺深欲至將合音律先同如此天運失時三年之中火疫至矣當刺肺之俞刺畢靜神七日勿大悲傷也悲傷即肺動而真氣復散也人慾實肺者要在息氣也又或地下甲子癸亥失守者即柔失守位也即上失其剛也即亦名戊癸不相合德者也即運與地虛後三年變癘即名火癘是故立地五年以明失守以窮法刺於是疫之與癘即是上下剛柔之名也窮歸一體也即刺疫法只有五法即總其諸位失守故只歸五行而統之也黃帝曰余聞五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易者岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干氣出於腦即室先想心如日欲將入於疫室先想青氣自肝而出左行於東化作林木次想白氣自肺而出右行於西化作戈甲次想赤氣自心而出南行於上化作焰明次想黑氣自腎而出北行於下化作水次想黃氣自脾而出存於中央化作土五氣護身之畢以想頭上如北斗之煌煌然後可入於疫室又一法於春分之日日未出而吐之又一法於雨水日後三浴以藥泄汗又一法小金丹方辰砂二兩水磨雄黃一兩葉子雌黃一兩紫金半兩同入閤中外固了地一尺築地實不用爐不須藥制用火二十斤煅之也七日終候冷七日取次日出合子埋藥地中七日取出順日研之三日煉白沙蜜為丸如梧桐子大每日望東吸日華氣一口冰水下一丸和氣咽之服十粒無疫干也黃帝問曰人虛即神遊失守位使鬼神外干是致夭亡何以全真願聞刺法岐伯稽首再拜曰昭乎哉問謂神移失守雖在其體然不致死或有邪干故令夭壽只如厥陰失守天以虛人氣肝虛感天重虛即魂遊於上邪干厥大氣身溫猶可刺之刺其足少陽之所過次刺肝之俞人病心虛又遇君相二火司天失守感而三虛遇火不及黑屍鬼犯之令人暴亡可刺手少陽之所過復刺心俞人脾病又遇太陰司天失守感而三虛又遇土不及青屍鬼邪犯之於人令人暴亡可刺足陽明之所過復刺脾之俞人肺病遇陽明司天失守感而三虛又遇金不及有赤屍鬼幹人令人暴亡可刺手陽明之所過復刺肺俞人腎病又遇太陽司天失守感而三虛又遇水運不及之年有黃屍鬼干犯人正氣吸人神魂致暴亡可刺足太陽之所過復刺腎俞黃帝問曰十二臟之相使神失位使神彩之不圓恐邪干犯治之可刺願聞其要岐伯稽首再拜曰悉乎哉問至理道真宗此非聖帝焉究斯源是謂氣神合道契符上天心者君主之官神明出焉可刺手少陰之源肺者相傅之官治節出焉可刺手太陰之源肝者將軍之官謀慮出焉可刺足厥陰之源膽者中正之官決斷出焉可刺足少陽之源膻中者臣使之官喜樂出焉可刺心包絡所流脾為諫議之官知周出焉可刺脾之源胃為倉廩之官五味出焉可刺胃之源大腸者傳道之官變化出焉可刺大腸之源小腸者受盛之官化物出焉可刺小腸之源腎者作強之官伎巧出焉刺其腎之源三焦者決瀆之官水道出焉刺三焦之源膀胱者州都之官津液藏焉氣化則能出矣刺膀胱之源凡此十二官者不得相失也是故刺法有全神養真之旨亦法有修真之道非治疾也故要修養和神也道貴常存補神固根精氣不散神守不分然即神守而雖不去亦能全真人神不守非達至真至真之要在乎天玄神守天息復入本元命曰歸宗本病論篇第七十三黃帝問曰天元九窒余已知之願聞氣交何名失守岐伯曰謂其上下升降遷正退位各有經論上下各有不前故名失守也是故氣交失易位氣交乃變變易非常即四時失序萬化不安變民病也帝曰升降不前願聞其故氣交有變何以明知岐伯曰昭乎問哉明乎道矣氣交有變是為天地機但欲降而不得降者地窒刑之又有五運太過而先天而至者即交不前但欲升而不得其升中運抑之但欲降而不得其降中運抑之於是有升之不前降之不下者有降之不下升而至天者有升降俱不前作如此之分別即氣交之變變之有異常各各不同災有微甚者也帝曰願聞氣交遇會勝抑之由變成民病輕重何如岐伯曰勝相會抑伏使然是故辰戌之歲木氣升之主逢天柱勝而不前又遇庚戌金運先天中運勝之忽然不前木運昇天金乃抑之升而不前即清生風少肅殺於春露霜復降草木乃萎民病溫疫早發咽嗌乃干四肢滿肢節皆痛久而化郁即大風摧拉折隕鳴紊民病卒中偏痹手足不仁是故巳亥之歲君火昇天主窒天蓬勝之不前又厥陰木遷正則少陰未得昇天水運以至其中者君火欲升而中水運抑之升之不前即清寒復作冷生旦暮民病伏陽而內生煩熱心神驚悸寒熱間作日久成郁即暴熱乃至赤風腫翳化疫溫癘暖作赤氣彰而化火疫皆煩而躁渴渴甚治之以泄之可止是故子午之歲太陰昇天主窒天衝勝之不前又或遇壬子木運先天而至者中木遇抑之也昇天不前即風埃四起時舉埃昏雨濕不化民病風厥涎潮偏痹不隨脹滿久而伏郁即黃埃化疫也民病夭亡臉肢府黃疸滿閉濕令弗布雨化乃微是故丑未之年少陽昇天主窒天蓬勝之不前又或遇太陰未遷正者即少陽未昇天也水運以至者昇天不前即寒雰反布凜冽如冬水復涸冰再結暄暖乍作冷復布之寒暄不時民病伏陽在內煩熱生中心神驚駭寒熱間爭以成久郁即暴熱乃生赤風氣瞳翳化成郁癘乃化作伏熱內煩痹而生厥甚則血溢是故寅申之年陽明昇天主窒天英勝之不前又或遇戊申戊寅火運先天而至金欲昇天火運抑之升之不前即時雨不降西風數舉鹹鹵燥生民病上熱喘嗽血溢久而化郁即白埃翳霧清生殺氣民病脅滿悲傷寒鼽嚏嗌乾手拆皮膚燥是故卯酉之年太陽昇天主窒天芮勝之不前又遇陽明未遷正者即太陽未昇天也土運以至水欲昇天土運抑之升之不前即濕而熱蒸寒生兩間民病注下食不及化久而成郁冷來客熱冰雹卒至民病厥逆而噦熱生於內氣痹於外足脛痠疼反生心悸懊熱暴煩而復厥黃帝曰升之不前余已盡知其旨願聞降之不下可得明乎岐伯曰悉乎哉問是之謂天地微旨可以盡陳斯道所謂升已必降也至天三年次歲必降降而入地始為左間也如此升降往來命之六紀者矣是故丑未之歲厥陰降地主窒地皛勝而不前又或遇少陰未退位即厥陰未降下金運以至中金運承之降之未下抑之變郁木欲降下金承之降而不下蒼埃遠見白氣承之風舉埃昏清躁行殺霜露覆下肅殺布令久而不降抑之化郁即作風躁相伏暄而反清草木萌動殺霜乃下蟄蟲未見懼清傷臟是故寅申之歲少陰降地主窒地玄勝之不入又或遇丙申丙寅水運太過先天而至君火欲降水運承之降而不下即彤雲才見黑氣反生暄暖如舒寒常布雪凜冽復作天云慘淒久而不降伏之化郁寒勝復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而溫病欲作也是故卯酉之歲太陰降地主窒地蒼勝之不入又或少陽未退位者即太陰未得降也或木運以至木運承之降而不下即黃云見而青霞彰鬱蒸作而大風霧翳埃勝折損乃作久而不降也伏之化郁天埃黃氣地布濕蒸民病四肢不舉昏眩肢節痛腹滿填臆是故辰戌之歲少陽降地主窒地玄勝之不入又或遇水運太過先天而至也水運承之水降不下即彤雲才見黑氣反生暄暖欲生冷氣卒至甚即冰雹也久而不降伏之化郁冷氣復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而熱病欲作也是故巳亥之歲陽明降地主窒地彤勝而不入又或遇太陰未退位即少陽未得降即火運以至之火運承之不下即天清而肅赤氣乃彰暄熱反作民皆昏倦夜臥不安咽乾引飲懊熱內煩天清朝暮暄還復作久而不降伏之化郁天清薄寒遠生白氣民病掉眩手足直而不仁兩脅作痛滿目䀮䀮是故子午之年太陽降地主窒地阜勝之降而不入又或遇土運太過先天而至土運承之降而不入即天彰黑氣暝暗悽慘才施黃埃而布濕寒化令氣蒸濕復令久而不降伏之化郁民病大厥四肢重怠陰萎少力天布沉陰蒸濕間作帝曰升降不前晰知其宗願聞遷正可得明乎岐伯曰正司中位是謂遷正位司天不得其遷正者即前司天以過交司之日即遇司天太過有餘日也即仍舊治天數新司天未得遷正也厥陰不遷正即風暄不時花卉萎瘁民病淋溲目系轉轉筋喜怒小便赤風欲令而寒由不去溫暄不正春正失時少陰不遷正即冷氣不退春冷後寒暄暖不時民病寒熱四肢煩痛腰脊強直木氣雖有餘位不過於君火也太陰不遷正即雲雨失令萬物枯焦當生不發民病手足肢節腫滿大腹水腫填臆不食飧泄脅滿四肢不舉雨化欲令熱猶治之溫煦於氣亢而不澤少陽不遷正即炎灼弗令苗莠不榮酷暑於秋肅殺晚至霜露不時民病㾬瘧骨熱心悸驚駭甚時血溢陽明不遷正則暑化於前肅殺於後草木反榮民病寒熱鼽嚏皮毛折爪甲枯焦甚則喘嗽息高悲傷不樂熱化乃布燥化未令即清勁未行肺金復病太陽不遷正即冬清反寒易令於春殺霜在前寒冰於後陽光復治凜冽不作雰云待時民病溫癘至喉閉溢干煩燥而渴喘息而有音也寒化待燥猶治天氣過失序與民作災帝曰遷正早晚以命其旨願聞退位可得明哉岐伯曰所謂不退者即天數未終即天數有餘名曰復布政故名曰再治天也即天令如故而不退位也厥陰不退位即大風早舉時雨不降濕令不化民病溫疫疵廢風生民病皆肢節痛頭目痛伏熱內煩咽喉干引飲少陰不退位即溫生春冬蟄蟲早至草木發生民病膈熱咽乾血溢驚駭小便赤澀丹瘤𤺋瘡瘍留毒太陰不退位而取寒暑不時埃昏布作濕令不去民病四肢少力食飲不下泄注淋滿足脛寒陰萎閉塞失溺小便數少陽不退位即熱生於春暑乃後化冬溫不凍流水不冰蟄蟲出見民病少氣寒熱更作便血上熱小腹堅滿小便赤沃甚則血溢陽明不退位即春生清冷草木晚榮寒熱間作民病嘔吐暴注食飲不下大便乾燥四肢不舉目瞑掉眩帝曰天歲早晚余以知之願聞地數可得聞乎岐伯曰地下遷正昇天及退位不前之法即地土產化萬物失時之化也帝曰余聞天地二甲子十干十二支上下經緯天地數有迭移失守其位可得昭乎岐伯曰失之迭位者謂雖得歲正未得正位之司即四時不節即生大疫注玄珠密語云陽年三十年除六年天刑計有太過二十四年除此六年皆作太過之用令不然之旨今言迭支迭位皆可作其不及也假令甲子陽年土運太窒如癸亥天數有餘者年雖交得甲子厥陰猶尚治天地已遷正陽明在泉去歲少陽以作右間即厥陰之地陽明故不相和奉者也癸巳相會土運太過虛反受木勝故非太過也何以言土運太過況黃鐘不應太窒木既勝而金還復金既復而少陰如至即木勝如火而金復微如此則甲己失守後三年化成土疫晚至丁卯早至丙寅土疫至也大小善惡推其天地詳乎太一又只如甲子年如甲至子而合應交司而治天即下己卯未遷正而戊寅少陽未退位者亦甲己下有合也即土運非太過而木乃乘虛而勝土也金次又行復勝之即反邪化也陰陽天地殊異爾故其大小善惡一如天地之法旨也假令丙寅陽年太過如乙丑天數有餘者雖交得丙寅太陰尚治天也地已遷正厥陰司地去歲太陽以作右間即天太陰而地厥陰故地不奉天化也乙辛相會水運太虛反受土勝故非太過即太簇之管太羽不應土勝而雨化水復即風此者丙辛失守其會後三年化成水疫晚至己巳早至戊辰甚即速微即徐水疫至也大小善惡推其天地數乃太乙遊宮又只如丙寅年丙至寅且合應交司而治天即辛巳未得遷正而庚辰太陽未退位者亦丙辛不合德也即水運亦小虛而小勝或有復後三年化癘名曰水癘其狀如水疫治法如前假令庚辰陽年太過如己卯天數有餘者雖交得庚辰年也陽明猶尚治天地已遷正太陰司地去歲少陰以作右間即天陽明而地太陰也故地下奉天也乙巳相會金運太虛反受火勝故非太過也即姑洗之管太商不應火勝熱化水復寒刑此乙庚失守其後三年化成金疫也速至壬午徐至癸未金疫至也大小善惡推本年天數及太一也又只如庚辰如庚至辰且應交司而治天即下乙未未得遷正者即地甲午少陰未退位者且乙庚不合德也即下乙未干失剛亦金運小虛也有小勝或無復後三年化癘名曰金癘其狀如金疫也治法如前假令壬午陽年太過如辛巳天數有餘者雖交後壬午年也厥陰猶尚治天地已遷正陽明在泉去歲丙申少陽以作右間即天厥陰而地陽明故地不奉天者也丁辛相合會木運太虛反受金勝故非太過也即蕤賓之管太角不應金行燥勝火化熱復甚即速微即徐疫至大小善惡推疫至之年天數及太一又只如壬至午且應交司而治之即下丁酉未得遷正者即地下丙申少陽未得退位者見丁壬不合德也即丁柔干失剛亦木運小虛也有小勝小復後三年化癘名曰木癘其狀如風疫法治如前假令戊申陽年太過如丁未天數太過者雖交得戊申年也太陰猶尚治天地已遷正厥陰在泉去歲壬戌太陽以退位作右間即天丁未地癸亥故地不奉天化也丁癸相會火運太虛反受水勝故非太過也即夷則之管上太徵不應此戊癸失守其會後三年化疫也速至庚戌大小善惡推疫至之年天數及太一又只如戊申如戊至申且應交司而治天即下癸亥未得遷正者即地下壬戌太陽未退位者見戊癸未合德也即下癸柔干失剛見火運小虛也有小勝或無復也後三年化癘名曰火癘也治法如前治之法可寒之泄之黃帝曰人氣不足天氣如虛人神失守神光不聚邪鬼幹人致有夭亡可得聞乎岐伯曰人之五臟一臟不足又會天虛感邪之至也人憂愁思慮即傷心又或遇少陰司天天數不及太陰作接間至即謂天虛也此即人氣天氣同虛也又遇驚而奪精汗出於心因而三虛神明失守心為君主之官神明出焉神失守位即神遊上丹田在帝太一帝君泥丸宮下神既失守神光不聚卻遇火不及之歲有黑屍鬼見之令人暴亡人飲食勞倦即傷脾又或遇太陰司天天數不及即少陽作接間至即謂之虛也此即人氣虛而天氣虛也又遇飲食飽甚汗出於胃醉飽行房汗出於脾因而三虛脾神失守脾為諫議之官智周出焉神既失守神光失位而不聚也卻遇土不及之年或己年或甲年失守或太陰天虛青屍鬼見之令人卒亡人久坐濕地強力入水即傷腎腎為作強之官伎巧出焉因而三虛腎神失守神志失位神光不聚卻遇水不及之年或辛不會符或丙年失守或太陽司天虛有黃屍鬼至見之令人暴亡人或恚怒氣逆上而不下即傷肝也又遇厥陰司天天數不及即少陰作接間至是謂天虛也此謂天虛人虛也又遇疾走恐懼汗出於肝肝為將軍之官謀慮出焉神位失守神光不聚又遇木不及年或丁年不符或壬年失守或厥陰司天虛也有白屍鬼見之令人暴亡也以上五失守者天虛而人虛也神遊失守其位即有五屍鬼幹人令人暴亡也謂之曰屍厥人犯五神易位即神光不圓也非但屍鬼即一切邪犯者皆是神失守位故也此謂得守者生失守者死得神者昌失神者亡
