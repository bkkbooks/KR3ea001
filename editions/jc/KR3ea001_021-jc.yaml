body:
  text: 卷第二十一六元正紀大論篇第七十一黃帝問曰六化六變勝復淫治甘苦辛鹹酸淡先後余知之矣夫五運之化或從五氣或逆天氣或從天氣而逆地氣或從地氣而逆天氣或相得或不相得余未能明其事欲通天之紀從地之理和其運調其化使上下合德無相奪倫天地升降不失其宜五運宣行勿乖其政調之正味從逆奈何岐伯稽首再拜對曰昭乎哉問也此天地之綱紀變化之淵源非聖帝孰能窮其至理歟臣雖不敏請陳其道令終不滅久而不易帝曰願夫子推而次之從其類序分其部主別其宗司昭其氣數明其正化可得聞乎岐伯曰先立其年以明其氣金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調陰陽卷舒近而無惑數之可數者請遂言之帝曰太陽之政奈何岐伯曰辰戌之紀也太陽太角太陰壬辰壬戌其運風其化鳴紊啟拆其變振拉摧拔其病眩掉目瞑太角初正少徵太宮少商太羽終太陽太徵太陰戊辰戊戌同正徴其運熱其化暄暑鬱燠其變炎烈沸騰其病熱鬱太徵少宮太商少羽終少角初太陽太宮太陰甲辰歲會同天符甲戌歲會同天符其運陰埃其化柔潤重澤其變震驚飄驟其病濕下重太宮少商太羽終太角初少徵太陽太商太陰庚辰庚戌其運涼其化霧露蕭飋其變肅殺雕零其病燥背瞀胸滿太商少羽終少角初太徵少宮太陽太羽太陰丙辰天符丙戌天符其運寒其化凝慘凓冽其變冰雪霜雹其病大寒留於溪谷太羽終太角初少徵太宮少商凡此太陽司天之政氣化運行先天天氣肅地氣靜寒臨太虛陽氣不令水土合德上應辰星鎮星其谷玄黅其政肅其令徐寒政大舉澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢初之氣地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍二之氣大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始三之氣天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死四之氣風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白五之氣陽復化草乃長乃化乃成民乃舒終之氣地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死故歲宜苦以燥之溫之必折其鬱氣先資其化源抑其運氣扶其不勝無使暴過而生其疾食歲谷以全其真避虛邪以安其正適氣同異多少制之同寒濕者燥熱化異寒濕者燥濕化故同者多之異者少之用寒遠寒用涼遠涼用溫遠溫用熱遠熱食宜同法有假者反常反是者病所謂時也帝曰善陽明之政奈何岐伯曰卯酉之紀也陽明少角少陰清熱勝復同同正商丁卯歲會丁酉其運風清熱少角初正太徵少宮太商少羽終陽明少徵少陰寒雨勝復同同正商癸卯同歲會癸酉同歲會其運熱寒雨少徵太宮少商太羽終太角初陽明少宮少陰風涼勝復同己卯己酉其運雨風涼少宮太商少羽終少角初太徵陽明少商少陰熱寒勝復同同正商乙卯天符乙酉歲會太一天符其運涼熱寒少商太羽終太角初少徵太宮陽明少羽少陰雨風勝復同同少宮辛卯辛酉其運寒雨風少羽終少角初太徵少宮太商凡此陽明司天之政氣化運行後天天氣急地氣明陽專其令炎暑大行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤其谷白丹間谷命太者其耗白甲品羽金火合德上應太白熒惑其政切其令暴蟄蟲乃見流水不冰民病咳嗌塞寒熱發暴振凓癃閟清先而勁毛蟲乃死熱後而暴介蟲乃殃其發躁勝復之作擾而大亂清熱之氣持於氣交初之氣地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋二之氣陽乃布民乃舒物乃生榮厲大至民善暴死三之氣天政布涼乃行燥熱交合燥極而澤民病寒熱四之氣寒雨降病暴僕振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便五之氣春令反行草乃生榮民氣和終之氣陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫故食歲谷以安其氣食間谷以去其邪歲宜以咸以苦以辛汗之清之散之安其運氣無使受邪折其鬱氣資其化源以寒熱輕重少多其制同熱者多天化同清者多地化用涼遠涼用熱遠熱用寒遠寒用溫遠溫食宜同法有假者反之此其道也反是者亂天地之經擾陰陽之紀也帝曰善少陽之政奈何岐伯曰寅申之紀也少陽太角厥陰壬寅同天符壬申同天符其運風鼓其化鳴紊啟坼其變振拉摧拔其病掉眩支脅驚駭太角初正少徵太宮少商太羽終少陽太徵厥陰戊寅天符戊申天符其運暑其化暄囂鬱燠其變炎烈沸騰其病上熱鬱血溢血泄心痛太徵少宮太商少羽終少角初少陽太宮厥陰甲寅甲申其運陰雨其化柔潤重澤其變震驚飄驟其病體重胕腫痞飲太宮少商太羽終太角初少徵少陽太商厥陰庚寅庚申同正商其運涼其化霧露清切其變肅殺雕零其病肩背胸中太商少羽終少角初太徵少宮少陽太羽厥陰丙寅丙申其運寒肅其化凝慘凓冽其變冰雪霜雹其病寒浮腫太羽終太角初少徵太宮少商凡此少陽司天之政氣化運行先天天氣正地氣擾風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼其政嚴其令擾故風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿故聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變初之氣地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡二之氣火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡三之氣天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死四之氣涼乃至炎暑間化白露降民氣和平其病滿身重五之氣陽乃去寒乃來雨乃降氣門乃閉剛木早雕民避寒邪君子周密終之氣地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳抑其運氣贊所不勝必折其鬱氣先取化源暴過不生苛疾不起故歲宜鹹辛宜酸滲之泄之漬之發之觀氣寒溫以調其過同風熱者多寒化異風熱者少寒化用熱遠熱用溫遠溫用寒遠寒用涼遠涼食宜同法此其道也有假者反之反是者病之階也帝曰善太陰之政奈何岐伯曰丑未之紀也太陰少角太陽清熱勝復同同正宮丁丑丁未其運風清熱少角初正太徵少宮太商少羽終太陰少徵太陽寒雨勝復同癸丑癸未其運熱寒雨少徵太宮少商太羽終太角太陰少宮太陽風清勝復同同正宮己丑太一天符己未太一天符其運雨風清少宮太商少羽終少角初太徵太陰少商太陽熱寒勝復同乙丑乙未其運涼熱寒少商太羽終太角初少徵太宮太陰少羽太陽雨風勝復同同正宮辛丑同歲會辛未同歲會其運寒雨風少羽終少角初太徵少宮太商凡此太陰司天之政氣化運行後天陰專其政陽氣退闢大風時起天氣下降地氣上騰原野昏霿白埃四起云奔南極寒雨數至物成於差夏民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急濕寒合德黃黑埃昏流行氣交上應鎮星辰星其政肅其令寂其谷黅玄故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間谷命其太也初之氣地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿二之氣大火正物承化民乃和其病溫厲大行遠近咸若濕蒸相薄雨乃時降三之氣天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿四之氣畏火臨溽蒸化地氣騰天氣痞隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫五之氣慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠終之氣寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕推於氣交而為疾也必折其鬱氣而取化源益其歲氣無使邪勝食歲谷以全其真食間谷以保其精故歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令御甚寒從氣異同少多其判也同寒者以熱化同濕者以燥化異者少之同者多之用涼遠涼用寒遠寒用溫遠溫用熱遠熱食宜同法假者反之此其道也反是者病也帝曰善少陰之政奈何岐伯曰子午之紀也少陰太角陽明壬子壬午其運風鼓其化鳴紊啟拆其變振拉摧拔其病支滿太角初正少徵太宮少商太羽終少陰太徵陽明戊子天符戊午太一天符其運炎暑其化暄曜鬱燠其變炎烈沸騰其病上熱血溢太徵少宮太商少羽終少角初少陰太宮陽明甲子甲午其運陰雨其化柔潤時雨其變震驚飄驟其病中滿身重太宮少商太羽終太角初少徵少陰太商陽明庚子同天符庚午同天符同正商其運涼勁其化霧露蕭飋其變肅殺雕零其病下清太商少羽終少角初太徵少宮少陰太羽陽明丙子歲會丙午其運寒其化凝慘凓冽其變冰雪霜雹其病寒下太羽終太角初少徵太宮少商凡此少陰司天之政氣化運行先天地氣肅天氣明寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其政明其令切其谷丹白水火寒熱持於氣交而為病始也熱病生於上清病生於下寒熱凌犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上初之氣地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍二之氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱三之氣天政布大火行庶類番鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤四之氣溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉鼽衄飲發五之氣畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫終之氣燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霿霧翳病生皮腠內舍於脅下連少腹而作寒中地將易也必抑其運氣資其歲勝折其鬱發先取化源無使暴過而生其病也食歲谷以全真氣食間谷以闢虛邪歲宜咸以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之適氣同異而多少之同天氣者以寒清化同地氣者以溫熱化用熱遠熱用涼遠涼用溫遠溫用寒遠寒食宜同法有假則反此其道也反是者病作矣帝曰善厥陰之政奈何岐伯曰巳亥之紀也厥陰少角少陽清熱勝復同同正角丁巳天符丁亥天符其運風清熱少角初正太徵少宮太商少羽終厥明少徵少陽寒雨勝復同癸巳同歲會癸亥同歲會其運熱寒雨少徵太宮少商太羽終太角初厥陰少宮少陽風清勝復同同正角己巳己亥其運雨風清少宮太商少羽終少角初太徵厥陰少商少陽熱寒勝復同同正角乙巳乙亥其運涼熱寒少商太羽終太角初少徵太宮厥陰少羽少陽雨風勝復同辛巳辛亥其運寒雨風少羽終少角初太徵少宮太商凡此厥陰司天之政氣化運行後天諸同正歲氣化運行同天天氣擾地氣正風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其政撓其令速其谷蒼丹間谷言太者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復形於中初之氣寒