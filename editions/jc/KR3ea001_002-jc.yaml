body:
  text: 卷第二陰陽應象大論篇第五黃帝曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也治病必求於本故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味厚則泄薄則通氣薄則發泄厚則發熱壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固故重陰必陽重陽必陰故曰冬傷於寒春必溫病春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽帝曰余聞上古聖人論理人形列別臟腑端絡經脈會通六合各從其經氣穴所發各有處名溪谷屬骨皆有所起分部逆從各有條理四時陰陽盡有經紀外內之應皆有表裡其信然乎岐伯對曰東方生風風生木木生酸酸生肝肝生筋筋生心肝主目其在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在體為筋在臟為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸南方生熱熱生火火生苦苦生心心生血血生脾心主舌其在天為熱在地為火在體為脈在臟為心在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦中央生濕濕生土土生甘甘生脾脾生肉肉生肺脾主口其在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭在變動為咳在竅為鼻在味為辛在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝腎主耳其在天為寒在地為水在體為骨在臟為腎在色為黑在音為羽在聲為呻在變動為慄在竅為耳在味為咸在志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸故曰天地者萬物之上下也陰陽者血氣之男女也左右者陰陽之道路也水火者陰陽之徵兆也陰陽者萬物之能始也故曰陰在內陽之守也陽在外陰之使也帝曰法陰陽奈何岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陰勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死能夏不能冬此陰陽更勝之變病之形能也帝曰調此二者奈何岐伯曰能知七損八益則二者可調不知用此則早衰之節也年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老故同出而名異耳智者察同愚者察異愚者不足智者有餘有餘則耳目聰明身體輕強老者復壯壯者益治是以聖人為無為之事樂恬憺之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也帝曰何以然岐伯曰東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之故天有精地有形天有八紀地有五里故能為萬物之父母清陽上天濁陰歸地是故天地之動靜神明為之綱紀故能以生長收藏終而復始惟賢人上配天以養頭下象地以養足中傍人事以養五臟天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象雷逆氣象陽故治不法天之紀不用地之理則災害至矣故邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微得過用之不殆善診者察色按脈先別陰陽審清濁而知部分視喘息聽音聲而知所苦觀權衡規矩而知病所主按尺寸觀浮沉滑澀而知病所生以治無過以診則不失矣故曰病之始起也可刺而已其盛可待衰而已故因其輕而揚之因其重而減之因其衰而彰之形不足者溫之以氣精不足者補之以味其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者漬形以為汗其在皮者汗而發之其慓悍者按而收之其實者散而瀉之審其陰陽以別柔剛陽病治陰陰病治陽定其血氣各守其鄉血實宜決之氣虛宜𤙲引之陰陰離合論篇第六黃帝問曰余聞天為陽地為陰日為陽月為陰大小月三百六十日成一歲人亦應之今三陰三陽不應陰陽其故何也岐伯對曰陰陽者數之可十推之可百數之可千推之可萬萬之大不可勝數然其要一也天覆地載萬物方生未出地者命曰陰處名曰陰中之陰則出地者命曰陰中之陽陽予之正陰為之主故生因春長因夏收因秋藏因冬失常則天地四塞陰陽之變其在人者亦數之可數帝曰願聞三陰三陽之離合也岐伯曰聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽太陽根起於至陰結於命門名曰陰中之陽中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明陽明根起於厲兌名曰陰中之陽厥陰之表名曰少陽少陽根起於竅陰名曰陰中之少陽是故三陽之離合也太陽為開陽明為闔少陽為樞三經者不得相失也搏而勿浮命曰一陽帝曰願聞三陰岐伯曰外者為陽內者為陰然則中為陰其衝在下名曰太陰太陰根起於隱白名曰陰中之陰太陰之後名曰少陰少陰根起於湧泉名曰陰中之少陰少陰之前名曰厥陰厥陰根起於大敦陰之絕陽名曰陰之絕陰是故三陰之離合也太陰為開厥陰為闔少陰為樞三經者不得相失也搏而勿沉名曰一陰陰陽沖沖積傳為一周氣里形表而為相成也陰陽別論篇第七黃帝問曰人有四經十二從何謂岐伯對曰四經應四時十二從應十二月十二月應十二脈脈有陰陽知陽者知陰知陰者知陽凡陽有五五五二十五陽所謂陰者真臟也見則為敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期三陽在頭三陰在手所謂一也別於陽者知病忌時別於陰者知死生之期謹熟陰陽無與眾謀所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽凡持真脈之臟脈者肝至懸絕急十八日死心至懸絕九日死肺至懸絕十二日死腎至懸絕七日死脾至懸絕四日死曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治曰三陽為病發寒熱下為癰腫及為痿厥腨㾓其傳為索澤其傳為頹疝曰一陽發病少氣善咳善泄其傳為心掣其傳為隔二陽一陰發病主驚駭背痛善噫善欠名曰風厥二陰一陽發病善脹心滿善氣三陽三陰發病為偏枯痿易四肢不舉鼓一陽曰鉤鼓一陰曰毛鼓陽勝急曰弦鼓陽至而絕曰石陰陽相過曰溜陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴陰之所生和本曰和是故剛與剛陽氣破散陰氣乃消亡淖則剛柔不和經氣乃絕死陰之屬不過三日而死生陽之屬不過四日而死所謂生陽死陰者肝之心謂之生陽心之肺謂之死陰肺之腎謂之重陰腎之脾謂之闢陰死不治結陽者腫四肢結陰者便血一升再結二升三結三升陰陽結斜多陰少陽曰石水少腹腫二陽結謂之消三陽結謂之隔三陰結謂之水一陰一陽結謂之喉痹陰搏陽別謂之有子陰陽虛腸闢死陽加於陰謂之汗陰虛陽搏謂之崩三陰俱搏二十日夜半死二陰俱搏十三日夕時死一陰俱搏十日死三陽俱搏且鼓三日死三陰三陽俱搏心腹滿發盡不得隱曲五日死二陽俱搏其病溫死不治不過十日死陰陽應象大論䐜脹上昌真切肉脹起也滲泄上所禁切翕赩下許極切噦噫上乙劣切下烏界切能冬上奴代切下能夏形能並同放效上妃兩切並於上去聲嗌伊者切滑澀下音色漬即賜切陰陽離合論予猶與也陰陽別論腨音喘腓腸也㾓音淵疼也淖音淘水朝宗於海
