body:
  text: 卷第二十氣交變大論篇第六十九黃帝問曰五運更治上應天期陰陽往復寒暑迎隨真邪相薄內外分離六經波盪五氣傾移太過過不及專勝兼併願言其始而有常名可得聞乎岐伯稽首再拜對曰昭乎哉問也是明道也此上帝所貴先師傳之臣雖不敏往聞其旨帝曰余聞得其人不教是謂失道傳非其人慢泄天寶余誠菲德未足以受至道然而眾子哀其不終願夫子保於無窮流於無極余司其事則而行之奈何岐伯曰請遂言之也上經曰夫道者上知天文下知地理中知人事可以長久此之謂也帝曰何謂也岐伯曰本氣位也位天者天文也位地者地理也通於人氣之變化者人事也故太過者先天不及者後天所謂治化而人應之也帝曰五運之化太過何如岐伯曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿上應歲星甚則忽忽善怒眩冒巔疾化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚衝陽絕者死不治上應太白星歲火太過炎暑流行肺金受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱上應熒惑星甚則胸中痛脅支滿脅痛膺背肩胛間痛兩臂內痛身熱骨痛而為浸淫收氣不行長氣獨明雨水霜寒上應辰星上臨少陰少陽火燔焫水泉涸物焦槁病反譫妄狂越咳喘息鳴下甚血溢泄不已太淵絕者死不治上應熒惑星歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤上應鎮星甚則肌肉萎足痿不收行善瘈腳下痛飲發中滿食減四肢不舉變生得位臟氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土崩潰鱗見於陸病腹滿溏泄腸鳴反下甚而太谿絕者死不治上應歲星歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星甚則喘咳逆氣肩背痛尻陰股膝髀腨䯒足皆病上應熒惑星收氣峻生氣下草木斂蒼干雕隕病反暴痛胠脅不可反側咳逆甚而血溢太衝絕者死不治上應太白星歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星甚則腹大脛腫喘咳寢汗出憎風大雨至埃霧朦郁上應鎮星上臨太陽則雨冰雪霜不時降濕氣變物病反腹滿腸鳴溏泄食不化渴而妄冒神門絕者死不治上應熒惑辰星帝曰善其不及何如岐伯曰悉乎哉問也歲木不及燥乃大行生氣失應草木晚榮肅殺而甚則剛木闢著柔萎蒼干上應太白星民病中清胠脅痛少腹痛腸鳴溏泄涼雨時至上應太白星其谷蒼上臨陽明生氣失政草木再榮化氣乃急上應太白鎮星其主蒼早復則炎暑流火濕性燥柔脆草木焦槁下體再生華實齊化病寒熱瘡瘍疿胗癰痤上應熒惑太白其谷白堅白露早降收殺氣行寒雨害物蟲食甘黃脾土受邪赤氣後化心氣晚治上勝肺金白氣乃屈其谷不成咳而鼽上應熒惑太白星歲火不及寒乃大行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美上應辰星民病胸中痛脅支滿兩脅痛膺背肩胛間及兩臂內痛鬱冒朦昧心痛暴喑胸腹大脅下與腰背相引而痛甚則屈不能伸髖髀如別上應熒惑辰星其谷丹復則埃郁大雨且至黑氣乃辱病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身上應鎮星辰星玄谷不成歲土不及風乃大行化氣不令草木茂榮飄揚而甚秀而不實上應歲星民病飧泄霍亂體重腹痛筋骨繇復肌肉瞤酸善怒臟氣舉事蟄蟲早附咸病寒中上應歲星鎮星其谷黅復則收政嚴峻名木蒼雕胸脅暴痛下引少腹善大息蟲食甘黃氣客於脾黅谷乃減民食少失味蒼谷乃損上應太白歲星上臨厥陰流水不冰蟄蟲來見臟氣不用白乃不復上應歲星民乃康歲金不及炎火乃行生氣乃用長氣專勝庶物以茂燥爍以行上應熒惑星民病肩背瞀重鼽嚏血便注下收氣乃後上應太白星其谷堅芒復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦戶痛延及囟頂發熱上應辰星丹谷不成民病口瘡甚則心痛歲水不及濕乃大行長氣反用其化乃速暑雨數至上應鎮星民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則跗腫臟氣不政腎氣不衡上應辰星其谷秬上臨太陰則大寒數舉蟄蟲早藏地積堅冰陽光不治民病寒疾於下甚則腹滿浮腫上應鎮星其主黅谷復則大風暴發草偃木零生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮物疏璺肌肉胗發氣並膈中痛於心腹黃氣乃損其谷不登上應歲星帝曰善願聞其時也岐伯曰悉哉問也木不及春有鳴條律暢之化則秋有霧露清涼之政春有慘淒殘賊之勝則夏有炎暑燔爍之復其眚東其臟肝其病內舍胠脅外在關節火不及夏有炳明光顯之化則冬有嚴肅霜寒之政夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其髒心其病內舍膺脅外在經絡土不及四維有埃云潤澤之化則春有鳴條鼓拆之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其臟脾其病內舍心腹外在肌肉四肢金不及夏有光顯鬱蒸之令則冬有嚴凝整肅之應夏有炎爍燔燎之變則秋有冰雹霜雪之復其眚西其臟肺其病內舍膺脅肩背外在皮毛水不及四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有瓢蕩振拉之復其眚北其臟腎其病內舍腰脊骨髓外在溪谷踹膝夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣故曰天地之動靜神明為之紀陰陽之往復寒暑彰其兆此之謂也帝曰夫子之言五氣之變四時之應可謂悉矣夫氣之動亂觸遇而作發無常會卒然災合何以期之岐伯曰夫氣之動變固不常在而德化政令災變不同其候也帝曰何謂也岐伯曰東方生風風生木其德敷和其化生榮其政舒啟其令風其變振發其災散落南方生熱熱生火其德彰顯其化蕃茂其政明曜其令熱其變銷爍其災燔焫中央生濕濕生土其德溽蒸其化豐備其政安靜其令濕其變驟注其災霖潰西方生燥燥生金其德清潔其化緊斂其政勁切其令燥其變肅殺其災蒼隕北方生寒寒生水其德淒滄其化清謐其政凝肅其令寒其變凓冽其災冰雪霜雹是以察其動也有德有化有政有令有變有災而物由之而人應之也帝曰夫子之言歲候其不及太過而上應五星今夫德化政令災眚變易非常而有也卒然而動其亦為之變乎岐伯曰承天而行之故無妄動無不應也卒然而動者氣之交變也其不應焉故曰應常不應卒此之謂也帝曰其應奈何岐伯曰各從其氣化也帝曰其行之徐疾逆順何如岐伯曰以道留久逆守而小是謂省下以道而去去而速來曲而過之是謂省遺過也久留而環或離或附是謂議災與其德也應近則小應遠則大芒而大倍常之一其化甚大常之二其眚即發也小常之一其化減小常之二是謂臨視省下之過與其德也德者福之過者伐之是以象之見也高而遠則小下而近則大故大則喜怒邇小則禍福遠歲運太過則運星北越運氣相得則各行以道故歲運太過畏星失色而兼其母不及則色兼其所不勝肖者瞿瞿莫知其妙閔閔之當孰者為良妄行無徵示畏侯王帝曰其災應何如岐伯曰亦各從其化也故時至有盛衰凌犯有逆順留守有多少形見有善惡宿屬有勝負徵應有吉凶矣帝曰其善惡何謂也岐伯曰有喜有怒有憂有喪有澤有燥此象之常也必謹察之帝曰六者高下異乎岐伯曰象見高下其應一也故人亦應之帝曰善其德化政令之動靜損益皆何如岐伯曰夫德化政令災變不能相加也勝復盛衰不能相多也往來小大不能相過也用之升降不能相無也各從其動而復之耳帝曰其病生何如岐伯曰德化者氣之祥政令者氣之章變易者復之紀災眚者傷之始氣相勝者和不相勝者病重感於邪則甚也帝曰善所謂精光之論大聖之業宣明大道通於無窮究於無極也余聞之善言天者必應於人善言古者必驗於今善言氣者必彰於物善言應者同天地之化善言化言變者通神明之理非夫子孰能言至道歟乃擇良兆而藏之靈室每旦讀之命曰氣交變非齋戒不敢發慎傳也五常政大論篇第七十黃帝問曰太虛寥廓五運回薄衰盛不同損益相從願聞平氣何如而名何如而紀也岐伯對曰昭乎哉問也木曰敷和火曰升明土曰備化金曰審平水曰靜順帝曰其不及奈何岐伯曰木曰委和火曰伏明土曰卑監金曰從革水曰涸流帝曰太過何謂岐伯曰木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍帝曰三氣之紀願聞其候岐伯曰悉乎哉問也敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其類草木其政發散其候溫和其令風其臟肝肝其畏清其主目其谷麻其果李其實核其應春其蟲毛其畜犬其色蒼其養筋其病裡急支滿其味酸其音角其物中堅其數八升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其類火其政明曜其候炎暑其令熱其髒心心其畏寒其主舌其穀麥其果杏其實絡其應夏其蟲羽其畜馬其色赤其養血其病瞤瘛其味苦其音徵其物脈其數七備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其類土其政安靜其候溽蒸其令濕其臟脾脾其畏風其主口其谷稷其果棗其實肉其應長夏其蟲倮其畜牛其色黃其養肉其病痞其味甘其音宮其物膚其數五審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其類金其政勁肅其候清切其令燥其臟肺肺其畏熱其主鼻其谷稻其果桃其實殼其應秋其蟲介其畜雞其色白其養皮毛其病咳其味辛其音商其物外堅其數九靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其類水其政流演其候凝肅其令寒其臟腎腎其畏濕其主二陰其谷豆其果慄其實濡其應冬其蟲鱗其畜彘其色黑其養骨髓其病厥其味鹹其音羽其物濡其數六故生而勿殺長而勿罰化而勿制收而勿害藏而勿抑是謂平氣委和之紀是謂勝生生氣不政化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼干雕落物秀而實膚肉內充其氣斂其用聚其動緛戾拘緩其發驚駭其臟肝其果棗李其實核殼其谷稷稻其味酸辛其色白蒼其畜犬雞其蟲毛介其主霧露淒滄其聲角商其病搖動注恐從金化也少角與判商同上角與正角同上商與正商同其病肢廢癰腫瘡瘍其甘蟲邪傷肝也上宮與正宮同蕭飋肅殺則炎赫沸騰眚於三所謂復也其主飛蠹蛆雉乃為雷霆伏明之紀是謂勝長長氣不宣臟氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其髒心其果慄桃其實絡濡其谷豆稻其味苦鹹其色玄丹其畜馬彘其蟲羽鱗其主冰雪霜寒其聲徵羽其病昏惑悲忘從水化也少徵與少羽同上商與正商同邪傷心也凝慘凜冽則暴雨霖霪眚於九其主驟注雷霆震驚沉霒淫雨卑監之紀是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而秕也其氣散其用靜定其動瘍湧分潰癰腫其發濡滯其臟脾其果李慄其實濡核其谷豆麻其味酸甘其色蒼黃其畜牛犬其蟲倮毛其主飄怒振發其聲宮角其病留滿痞塞從木化也少宮與少角同上宮與正宮同上角與正角同其病飧泄邪傷脾也振拉飄揚則蒼干散落其眚四維其主敗折虎狼清氣乃用生政乃辱從革之紀是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用躁切其動鏗禁瞀厥其發咳喘其臟肺其果李杏其實殼絡其谷麻麥其味苦辛其色白丹其畜雞羊其蟲介羽其主明曜炎爍其聲商徵其病嚏咳鼽衄從火化也少商與少徵同上商與正商同上角與正角同邪傷肺也炎光赫烈則冰雪霜雹眚於七其主鱗伏彘鼠歲氣早至乃生大寒涸流之紀是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其臟腎其果棗杏其實濡肉其谷黍稷其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其主埃郁昏翳其聲羽宮其病痿厥堅下從土化也少羽與少宮同上宮與正宮同其病癃閟邪傷腎也埃昏驟雨則振拉摧拔眚於一其主毛顯狐狢變化不藏故乘危而行不速而至暴虐無德災反及之微者復微甚者復甚氣之常也發生之紀是謂啟陳土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啟坼其變振拉摧拔其谷麻稻其畜雞犬其果李桃其色青黃白其味酸甘辛其象春其經足厥陰少陽其臟肝脾其蟲毛介其物中堅外堅其病怒太角與上商同上徵則其氣逆其病吐利不務其德則收氣復秋氣勁切甚則肅殺清氣大至草木雕零邪乃傷肝赫曦之紀是謂蕃茂陰氣內化陽氣外榮炎暑施化物得以昌其化長其氣高其政動其令鳴顯其動炎灼妄擾其德暄暑鬱蒸其變炎烈沸騰其穀麥豆其畜羊彘其果杏慄其色赤白玄其味苦辛鹹其象夏其經手少陰太陽手厥陰少陽其髒心肺其蟲羽鱗其物脈濡其病笑瘧瘡瘍血流狂妄目赤上羽與正徵同其收齊其病痓上徵而收氣後也暴烈其政臟氣乃復時見凝慘甚則雨水霜雹切寒邪傷心也敦阜之紀是謂廣化厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢其化圓其氣豐其政靜其令周備其動濡積並稸其德柔潤重淖其變震驚飄驟崩潰其谷稷麻其畜牛犬其果棗李其色黅玄蒼其味甘鹹酸其象長夏其經足太陰陽明其臟脾腎其蟲倮毛其物肌核其病腹滿四肢不舉大風迅至邪傷脾也堅成之紀是謂收引天氣潔地氣明陽氣隨陰治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令銳切其動暴折瘍疰其德霧露蕭飋其變肅殺雕零其谷稻黍其畜雞馬其果桃杏其色白青丹其味辛酸苦其象秋其經手太陰陽明其臟肺肝其蟲介羽其物殼絡其病喘喝胸憑仰息上徵與正商同其生齊其病咳政暴變則名木不榮柔脆焦首長氣斯救大火流炎爍且至蔓將槁邪傷肺也流衍之紀是謂封藏寒司物化天地嚴凝藏政以布長令不揚其化凜其氣堅其政謐其令流注其動漂泄沃湧其德凝慘寒雰其變冰雪霜雹其谷豆稷其畜彘牛其果慄棗其色黑丹黅其味鹹苦甘其象冬其經足少陰太陽其臟腎心其蟲鱗倮其物濡滿其病脹上羽而長氣不化也政過則化氣大舉而埃昏氣交大雨時降邪傷腎也故曰不恆其德則所勝來復政恆其理則所勝同化此之謂也帝曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也岐伯曰陰陽之氣高下之理太少之異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼是以地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳帝曰其於壽夭何如岐伯曰陰精所奉其人壽陽精所降其人夭帝曰善其病也治之奈何岐伯曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之帝曰善一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天此地理之常生化之道也帝曰其有壽夭乎岐伯曰高者其氣壽下者其氣夭地之小大異也小者小異大者大異故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣帝曰善其歲有不病而臟氣不應不用者何也岐伯曰天氣制之氣有所從也帝曰願卒聞之岐伯曰少陽司天火氣下臨肺氣上從白起金用草木眚火見燔焫革金且耗大暑以行咳嚏鼽衄鼻窒曰瘍寒熱胕腫風行於地塵沙飛揚心痛胃脘痛厥逆膈不通其主暴速陽明司天燥氣下臨肝氣上從蒼起木用而立土乃眚淒滄數至木伐草萎脅痛目赤掉振鼓慄筋痿不能久立暴熱至土乃暑陽氣鬱發小便變寒熱如瘧甚則心痛火行於稿流水不冰蟄蟲乃見太陽司天寒氣下臨心氣上從而火且明丹起金乃眚寒清時舉勝則水冰火氣高明心熱煩嗌乾善渴鼽嚏喜悲數欠熱氣妄行寒乃復霜不時降善忘甚則心痛土乃潤水豐衍寒客至沉陰化濕氣變物水飲內稸中滿不食皮𤸷肉苛筋脈不利甚則胕腫身後癰厥陰司天風氣下臨脾氣上從而土且隆黃起水乃眚土用革體重肌肉萎食減口爽風行太虛雲物搖動目轉耳鳴火縱其暴地乃暑大熱消爍赤沃下蟄蟲數見流水不冰其發機速少陰司天熱氣下臨肺氣上從白起金用草木眚喘嘔寒熱嚏鼽衄鼻窒大暑流行甚則瘡瘍燔灼金爍石流地乃燥清淒滄數至脅痛善太息肅殺行草木變太陰司天濕氣下臨腎氣上從黑起水變埃冒雲雨胸中不利陰痿氣大衰而不起不用當其時反腰脽痛動轉不便也厥逆地乃藏陰大寒且至蟄蟲早附心下痞痛地裂冰堅少腹痛時害於食乘金則止水增味乃咸行水減也帝曰歲有胎孕不育治之不全何氣使然岐伯曰六氣五類有相勝制也同者盛之異者衰之此天地之道生化之常也故厥陰司天毛蟲靜羽蟲育介蟲不成在泉毛蟲育倮蟲耗羽蟲不育少陰司天羽蟲靜介蟲育毛蟲不成在泉羽蟲育介蟲耗不育太陰司天倮蟲靜鱗蟲育羽蟲不成在泉倮蟲育鱗蟲不成少陽司天羽蟲靜毛蟲育倮蟲不成在泉羽蟲育介蟲耗毛蟲不育陽明司天介蟲靜羽蟲育介蟲不成在泉介蟲育毛蟲耗羽蟲不成太陽司天鱗蟲靜倮蟲育在泉鱗蟲耗倮蟲不育諸乘所不成之運則甚也故氣主有所制歲立有所生地氣制己勝天氣制勝己天制色地制形五類衰盛各隨其氣之所宜也故有胎孕不育治之不全此氣之常也所謂中根也根於外者亦五故生化之別有五氣五味五色五類五宜也帝曰何謂也岐伯曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絕故各有制各有勝各有生各有成故曰不知年之所加氣之同異不足以言生化此之謂也帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也然而五味所資生化有薄厚成熟有少多終始不同其故何也岐伯曰地氣制之也非天不生地不長也帝曰願聞其道岐伯曰寒熱燥濕不同其化也故少陽在泉寒毒不生其味辛其治苦酸其谷蒼丹陽明在泉濕毒不生其味酸其氣濕其治辛苦甘其谷丹素太陽在泉熱毒不生其味苦其治淡咸其谷黅秬厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤其氣專其味正少陰在泉寒毒不生其味辛其治辛苦甘其谷白丹太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅秬化淳則咸守氣專則辛化而俱治故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之故曰上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也氣反者病在上取之下病在下取之上病在中旁取之治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之故消之削之吐之下之補之瀉之久新同法帝曰病在中而不實不堅且聚且散奈何岐伯曰悉乎哉問也無積者求其藏虛則補之藥以祛之食以隨之行水漬之和其中外可使畢已帝曰有毒無毒服有約乎岐伯曰病有久新方有大小有毒無毒固宜常制矣大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法必先歲氣無伐天和無盛盛無虛虛而遺人天殃無致邪無失正絕人長命帝曰其久病者有氣從不康病去而瘠奈何岐伯曰昭乎哉聖人之問也化不可代時不可違夫經絡以通血氣以從復其不足與眾齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也帝曰善氣交變大論槁苦老切瞼音檢𥇒音接蠹音妬鶩音木璺音問謐音蜜五常政大論瞤如勻切凊妻徑切飋音瑟霒音今麂音幾鏗音坑瞀音冒拉音蠟猯他端切磧妻力切鴷音列
