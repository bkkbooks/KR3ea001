body:
  text: 後序家大人未供奉內藥院時見從德少喜醫方術為語曰世無長桑君指授不得飲上池水盡見人五臟必從黃帝之脈書五色診候始知逆順陰陽按奇絡活人不然者雖聖儒無所從精也今世所傳內經素問即黃帝之脈書廣衍於秦越人陽慶淳于意諸長老其文遂似漢人語而旨意所從來遠矣客歲以試事北上問視之暇遂以宋刻善本見授曰廣其傳非細事也汝圖之從德竊惟吳儒者王光庵賓嘗學內經素問於戴原禮可一年所即治病輒驗晚歲以其學授盛啟東韓叔陽後被薦文皇帝召對稱旨俱留御藥院供御一日入見便殿上語次偶及白溝之勝為識長蛇陣耳啟東以天命對是不但慷慨敢言抑學術之正見於天人之際亦微矣秦太醫令所謂上醫醫國殆如此耶故吳中多上醫實出原禮為上古自來之正派以從授是書也家大人仰副今上仁壽天下之意甚切亟欲廣其佳本公暇校讎至忘寢食予小子敢遂翻刻以見承訓之私云嘉靖庚戌秋八月既望武陵顧從德謹識
