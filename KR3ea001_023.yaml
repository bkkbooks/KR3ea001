body:
  text: 卷第二十三著至教論篇第七十五黃帝坐明堂召雷公而問之曰子知醫之道乎雷公對曰誦而未能解解而未能別別而未能明明而未能彰足以治群僚不足治侯王願得受樹天之度四時陰陽合之別星辰與日月光以彰經術後世益明上通神農著至教疑於二皇帝曰善無失之此皆陰陽表裡上下雌雄相輸應也而道上知天文下知地理中知人事可以長久以教衆庶亦不疑殆醫道論篇可傳後世可以為寶雷公曰請受道諷誦用解帝曰子不聞陰陽傳乎曰不知曰夫三陽天為業上下無常合而病至偏害陰陽雷公曰三陽莫當請聞其解帝曰三陽獨至者是三陽並至並至如風雨上為巔疾下為漏病外無期內無正不中經紀診無上下以書別雷公曰臣治疏愈説意而已帝曰三陽者至陽也積並則為驚病起疾風至如霹靂九竅皆塞陽氣滂溢干嗌喉塞並於陰則上下無常薄為腸澼此謂三陽直心坐不得起臥者便身全三陽之病且以知天下何以別陰陽應四時合之五行雷公曰陽言不別陰言不理請起受解以為至道帝曰子若受傳不知合至道以惑師教語子至道之要病傷五臟筋骨以消子言不明不別是世主學盡矣腎且絶惋惋日暮從容不出人事不殷示從容論篇第七十六黃帝燕坐召雷公而問之曰汝受術誦書者若能覽觀雜學及於比類通合道理為余言子所長五臟六腑膽胃大小腸脾胞膀胱腦髓涕唾哭泣悲哀水所從行此皆人之所生治之過失子務明之可以十全即不能知為世所怨雷公曰臣請誦脈經上下篇甚衆多矣別異比類猶未能以十全又安足以明之帝曰子別試通五臟之過六腑之所不和針石之敗毒藥所宜湯液滋味具言其狀悉言以對請問不知雷公曰肝虛腎虛脾虛皆令人體重煩冤當投毒藥刺灸砭石湯液或已或不已願聞其解帝曰公何年之長而問之少余真問以自謬也吾問子窈冥子言上下篇以對何也夫脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也然從容得之若夫三髒土木水參居此童子之所知問之何也雷公曰於此有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜臥此何臟之發也脈浮而弦切之石堅不知其解復問所以三臟者以知其比類也帝曰夫從容之謂也夫年長則求之於腑年少則求之於經年壯則求之於臟今子所言皆失八風菀熟五臟消爍傳邪相受夫浮而弦者是腎不足也沉而石者是腎氣內著也怯然少氣者是水道不行形氣消索也咳嗽煩冤者是腎氣之逆也一人之氣病在一臟也若言三臟俱行不在法也雷公曰於此有人四肢解惰喘咳血泄而愚診之以為傷肺切脈浮大而緊愚不敢治粗工下砭石病愈多出血血止身輕此何物也帝曰子所能治知亦衆多與此病失矣譬以鴻飛亦衝於天夫聖人之治病循法守度援物比類化之冥冥循上及下何必守經今夫脈浮大虛者是脾氣之外絶去胃外歸陽明也夫二火不勝三水是以脈亂而無常也四肢解惰此脾精之不行也喘咳者是水氣並陽明也血泄者脈急血無所行也若夫以為傷肺者由失以狂也不引比類是知不明也夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈旁絶五臟漏泄不衄則嘔此二者不相類也譬如天之無形地之無理白與黑相去遠矣是失吾過矣以子知之故不告子明引比類從容是以名曰診輕是謂至道也疏五過論篇第七十七黃帝曰嗚呼遠哉閔閔乎若視深淵若迎浮雲視深淵尚可測迎浮雲莫知其際聖人之術為萬民式論裁志意必有法則循經守數按循醫事為萬民副故事有五過四德汝知之乎雷公避席再拜曰臣年幼小蒙愚以惑不聞五過與四德比類形名虛引其經心無所對帝曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不在臟腑不變軀形診之而疑不知病名身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於榮良工所失不知病情此亦治之一過也凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也診有三常必問貴賤封君敗傷及欲侯王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也凡診者必知終始有知餘緒切脈問名當合男女離絶菀結憂恐喜怒五臟空虛血氣離守工不能知何術之語嘗富大傷斬筋絶脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發唯言死日亦為粗工此治之五過也凡此五者皆受術不通人事不明也故曰聖人之治病也必知天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於分部知病本始八正九候診必副矣治病之道氣內為寶循求其理求之不得過在表裡守數據治無失俞理能行此術終身不殆不知俞理五臟菀熟癰發六腑診病不審是謂失常謹守此治與經相明上經下經揆度陰陽奇恆五中決以明堂審於終始可以橫行徵四失論篇第七十八黃帝在明堂雷公侍坐黃帝曰夫子所通書受事衆多矣試言得失之意所以得之所以失之雷公對曰循經受業皆言十全其時有過失者請聞其事解也帝曰子年少智未及邪將言以雜合耶夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不十全者精神不專志意不理外內相失故時疑殆診不知陰陽逆從之理此治之一失矣受師不卒妄作雜術謬言為道更名自功妄用砭石後遺身咎此治之二失也不適貧富貴賤之居坐之薄厚形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也是以世人之語者馳千里之外不明尺寸之論診無人事治數之道從容之葆坐持寸口診不中五脈百病所起始以自怨遺師其咎是故治不能循理棄術於市妄治時愈愚心自得嗚呼窈窈冥冥熟知其道道之大者擬於天地配於四海汝不知道之諭受以明為晦著至教論恤音戌示從容論砭方驗切疏五過論沮七餘反憚音但徵四失論佚音逸葆音保
