body:
  text: 卷第二十二至真要大論篇第七十四黃帝問曰五氣交合盈虛更作余知之矣六氣分治司天地者其至何如岐伯再拜對曰明乎哉問也天地之大紀人神之通應也帝曰願聞上合昭昭下合冥冥奈何岐伯曰此道之所主工之所疑也帝曰願聞其道也岐伯曰厥陰司天其化以風少陰司天其化以熱太陰司天其化以濕少陽司天其化以火陽明司天其化以燥太陽司天其化以寒以所臨臟位命其病者也帝曰地化奈何岐伯曰司天同候間氣皆然帝曰間氣何謂岐伯曰司左右者是謂間氣也帝曰何以異之岐伯曰主歲者紀歲間氣者紀步也帝曰善歲主奈何岐伯曰厥陰司天為風化在泉為酸化司氣為蒼化間氣為動化少陰司天為熱化在泉為苦化不司氣化居氣為灼化太陰司天為濕化在泉為甘化司氣為黅化間氣為柔化少陽司天為火化在泉為苦化司氣為丹化間氣為明化陽明司天為燥化在泉為辛化司氣為素化間氣為清化太陽司天為寒化在泉為咸化司氣為玄化間氣為藏化故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也帝曰厥陰在泉而酸化先余知之矣風化之行也何如岐伯曰風行於地所謂本也餘氣同法本乎天者天之氣也本乎地者地之氣也天地合氣六節分而萬物化生矣故曰謹候氣宜無失病機此之謂也帝曰其主病何如岐伯曰司歲備物則無遺主矣帝曰先歲物何也岐伯曰天地之專精也帝曰司氣者何如岐伯曰司氣者主歲同然有餘不足也帝曰非司歲物何謂也岐伯曰散也故質同而異等也氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也帝曰歲主藏害何謂岐伯曰以所不勝命之則其要也帝曰治之奈何岐伯曰上淫於下所勝平之外淫於內所勝治之帝曰善平氣何如岐伯曰謹察陰陽所在而調之以平為期正者正治反者反治帝曰夫子言察陰陽所在而調之論言人迎與寸口相應若引繩小大齊等命曰平陰之所在寸口何如岐伯曰視歲南北可知之矣帝曰願卒聞之岐伯曰北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應諸不應者反其診則見矣帝曰尺候何如岐伯曰北政之歲三陰在下則寸不應三陰在上則尺不應南政之歲三陰在天則寸不應三陰在泉則尺不應左右同故曰知其要者一言而終不知其要流散無窮此之謂也帝曰善天地之氣內淫而病何如岐伯曰歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善伸數欠心痛支滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重歲少陰在泉熱淫所勝則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大蟄蟲不藏歲太陰在泉草乃早榮濕淫所勝則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別歲少陽在泉火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便少陰同候歲陽明在泉燥淫所勝則霿霧清暝民病喜嘔嘔有苦善大息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱歲太陽在泉寒淫所勝則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫帝曰善治之奈何岐伯曰諸氣在泉風淫於內治以辛涼佐以苦以甘緩之以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之燥淫於內治以苦溫佐以甘辛以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之帝曰善天氣之變何如岐伯曰厥陰司天風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本於脾衝陽絶死不治少陰司天熱淫所勝怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺尺澤絶死不治太陰司天濕淫所勝則沉陰且布雨變枯稿胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本干腎太溪絶死不治少陽司天火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺天府絶死不治陽明司天燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目眛眥瘍瘡痤癰蟄蟲來見病本於肝太衝絶死不治太陽司天寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣掖腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心神門絶死不治所謂動氣知其藏也帝曰善治之奈何岐伯曰司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之熱淫所勝平以鹹寒佐以苦甘以酸收之濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故而止火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱淫同燥淫所勝平以苦濕佐以酸辛以苦下之寒淫所勝平以辛熱佐以甘苦以咸瀉之帝曰善邪氣反勝治之奈何岐伯曰風司於地清反勝之治以酸溫佐以苦甘以辛平之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和為利寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之帝曰其司天邪勝何如岐伯曰風化於天清反勝之治以酸溫佐以甘苦熱化於天寒反勝之治以甘溫佐以苦酸辛濕化於天熱反勝之治以苦寒佐以苦酸火化於天寒反勝之治以甘熱佐以苦辛燥化於天熱反勝之治以辛寒佐以苦甘寒化於天熱反勝之治以鹹冷佐以苦辛帝曰六氣相勝奈何岐伯曰厥陰之勝耳鳴頭眩憒憒欲吐胃膈如寒大風數舉倮蟲不滋胠脅氣並化而為熱小便黃赤胃脘當心而痛上支兩脅腸鳴飧泄少腹痛注下赤白甚則嘔吐膈咽不通少陰之勝心下熱善飢臍下反動氣遊三焦炎暑至木乃津草乃萎嘔逆躁煩腹滿痛溏泄傳為赤沃太陰之勝火氣內郁瘡瘍於中流散於外病在胠脅甚則心痛熱格頭痛喉痹項強獨勝則濕氣內郁寒迫下焦痛留頂互引眉間胃滿雨數至燥化乃見少腹滿腰脽重強內不便善注泄足下溫頭重足脛胕腫飲發於中胕腫於上少陽之勝熱客於胃煩心心痛目赤欲嘔嘔酸善飢耳痛溺赤善驚譫妄暴熱消爍草萎水涸介蟲乃屈少腹痛下沃赤白陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳太陽之勝凝溧且至非時水冰羽乃後化痔瘧發寒厥入胃則內生心痛陰中乃瘍隱曲不利互引陰股筋肉拘苛血脈凝泣絡滿色變或為血泄皮膚痞腫腹滿食減熱反上行頭項囟頂腦戶中痛目如脫寒入下焦傳為濡瀉帝曰治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸瀉之少陰之勝治以辛寒佐以苦鹹以甘瀉之太陰之勝治以咸熱佐以辛甘以苦瀉之少陽之勝治以辛寒佐以甘鹹以甘瀉之陽明之勝治以酸溫佐以辛甘以苦泄之太陽之勝治以甘熱佐以辛酸以咸瀉之帝曰六氣之復何如岐伯曰悉乎哉問也厥陰之復少腹堅滿裡急暴痛偃木飛沙倮蟲不榮厥心痛汗發嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐衝陽絶死不治少陰之復燠熱內作煩躁鼽嚏少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右咳皮膚痛暴喑心痛鬱冒不知人乃灑淅惡寒振栗譫妄寒已而熱渴而欲飲少氣骨痿隔腸不便外為浮腫噦噫赤氣後化流水不冰熱氣大行介蟲不復病痱疹瘡瘍癰疽痤痔甚則入肺咳而鼻淵天府絶死不治太陰之復濕變乃舉體重中滿食飲不化陰氣上厥胸中不便飲發於中咳喘有聲大雨時行鱗見於陸頭頂痛重而掉瘛尤甚嘔而密默唾吐清液甚則入腎竅瀉無度太溪絶死不治少陽之復大熱將至枯燥燔爇介蟲乃耗驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目乃瞤瘛火氣內發上為口糜嘔逆血溢血泄發而為瘧惡寒鼓栗寒極反熱嗌絡焦稿渴引水漿色變黃赤少氣脈萎化而為水傳為胕腫甚則入肺咳而血泄尺澤絶死不治陽明之復清氣大舉森木蒼干毛蟲乃厲病生胠脅氣歸於左善太息甚則心痛痞滿腹脹而泄嘔苦咳噦煩心病在膈中頭痛甚則入肝驚駭筋攣太衝絶死不治太陽之復厥氣上行水凝雨冰羽蟲乃死心胃生寒胸膈不利心痛痞滿頭痛善悲時眩僕食減腰脽反痛屈伸不便地裂冰堅陽光不治少腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲神門絶死不治帝曰善治之奈何岐伯曰厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸耎之太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之少陽之復治以鹹冷佐以苦辛以咸耎之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之太陽之復治以咸熱佐以甘辛以苦堅之治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也帝曰善氣之上下何謂也岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也故上勝而下俱病者以地名之下勝而上俱病者以天名之所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣為法也帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也帝曰願聞其道也岐伯曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否帝曰善復已而勝何如岐伯曰勝至則復無常數也衰乃止耳復已而勝不復則害此傷生也帝曰復而反病何也岐伯曰居非其位不相得也大復其勝則主勝之故反病也所謂火燥熱也帝曰治之何如岐伯曰夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也帝曰善客主之勝復奈何岐伯曰客主之氣勝而無復也帝曰其逆從何如岐伯曰主勝逆客勝從天之道也帝曰其生病何如岐伯曰厥陰司天客勝則耳鳴掉眩甚則咳主勝則胸脅痛舌難以言少陰司天客勝則鼽嚏頸項強肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘主勝則心熱煩躁甚則脅痛支滿太陰司天客勝則首面胕腫呼吸氣喘主勝則胸腹滿食已而瞀少陽司天客勝則丹疹外發及為丹熛瘡瘍嘔逆喉痹頭痛嗌腫耳聾血溢內為瘛瘲主勝則胸滿咳仰息甚而有血手熱陽明司天清復內余則咳衄嗌塞心膈中熱咳不止而白血出者死太陽司天客勝則胸中不利出清涕感寒則咳主勝則喉嗌中鳴厥陰在泉客勝則大關節不利內為痙強拘瘛外為不便主勝則筋骨繇並腰腹時痛少陰在泉客勝則腰痛尻股膝髀腨䯒足病瞀熱以酸胕腫不能久立溲便變主勝則厥氣上行心痛發熱膈中衆痹皆作發於胠脅魄汗不藏四逆而起太陰在泉客勝則足痿下重便溲不時濕客下焦發而濡瀉及為腫隱曲之疾主勝則寒氣逆滿食飲不下甚則為疝少陽在泉客勝則腰腹痛而反惡寒甚則下白溺白主勝則熱反上行而客於心心痛發熱格中而嘔少陰同候陽明在泉客勝則清氣動下少腹堅滿而數便瀉主勝則腰重腹痛少腹生寒下為鶩溏則寒厥於腸上衝胸中甚則喘不能久立太陽在泉寒復內余則腰尻痛屈伸不利股脛足膝中痛帝曰善治之奈何岐伯曰高者抑之下者舉之有餘折之不足補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之帝曰治寒以熱治熱以寒氣相得者逆之不相得者從之余以知之矣其於正味何如岐伯曰木位之主其瀉以酸其補以辛火位之主其瀉以甘其補以咸土位之主其瀉以苦其補以甘金位之主其瀉以辛其補以酸水位之主其瀉以咸其補以苦厥陰之客以辛補之以酸瀉之以甘緩之少陰之客以咸補之以甘瀉之以咸收之太陰之客以甘補之以苦瀉之以甘緩之少陽之客以咸補之以甘瀉之以咸耎之陽明之客以酸補之以辛瀉之以苦泄之太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也帝曰善願聞陰陽之三也何謂岐伯曰氣有多少異用也帝曰陽明何謂也岐伯曰兩陽合明也帝曰厥陰何也岐伯曰兩陰交盡也帝曰氣有多少病有盛衰治有緩急方有大小願聞其約奈何岐伯曰氣有高下病有遠近證有中外治有輕重適其至所為故也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也故曰近者奇之遠者偶之汗者不以奇下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也病所遠而中道氣味之者食而過之無越其制度也是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也帝曰善病生於本余知之矣生於標者治之奈何岐伯曰病反其本得標之病治反其本得標之方帝曰善六氣之勝何以候之岐伯曰乘其至也清氣大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也金燥受邪肺病生焉寒氣大來水之勝也火熱受邪心病生焉濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉所謂感邪而生病也乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也重感於邪則病危矣有勝之氣其必來復也帝曰其脈至何如岐伯曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危帝曰六氣標本所從不同奈何岐伯曰氣有從本者有從標本者有不從標本者也帝曰願卒聞之岐伯曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也帝曰脈從而病反者其診何如岐伯曰脈至而從按之不鼓諸陽皆然帝曰諸陰之反其脈何如岐伯曰脈至而從按之鼓甚而盛也是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也故曰知標與本用之不殆明知逆順正行無問此之謂也不知是者不足以言診足以亂經故大要曰粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也夫標本之道要而博小而大可以言一而知百病之害言標與本易而勿損察本與標氣可令調明知勝復為萬民式天之道畢矣帝曰勝復之變早晏何如岐伯曰夫所勝者勝至已病病已慍慍而復已萌也夫所復者勝盡而起得位而甚勝有微甚復有少多勝和而和勝虛而虛天之常也帝曰勝復之作動不當位或後時而至其故何也岐伯曰夫氣之生與其化衰盛異也寒暑溫涼盛衰之用其在四維故陽之動始於溫盛於暑陰之動始於清盛於寒春夏秋冬各差其分故大要曰彼春之暖為夏之暑彼秋之忿為冬之怒謹按四維斥候皆歸其終可見其始可知此之謂也帝曰差有數乎岐伯曰又凡三十度也帝曰其脈應皆何如岐伯曰差同正法待時而去也脈要曰春不沉夏不弦冬不澀秋不數是謂四塞沉甚曰病弦甚曰病澀甚曰病數甚曰病參見曰病復見曰病未去而去曰病去而不去曰病反者死故曰氣之相守司也如權衡之不得相失也夫陰陽之氣清靜則生化治動則苛疾起此之謂也帝曰幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之配寒暑之異也帝曰分至何如岐伯曰氣至之謂至氣分之謂分至則氣同分則氣異所謂天地之正紀也帝曰夫子言春秋氣始於前冬夏氣始於後余已知之矣然六氣往復主歲不常也其補瀉奈何岐伯曰上下所主隨其攸利正其味則其要也左右同法大要曰少陽之主先甘後咸陽明之主先辛後酸太陽之主先咸後苦厥陰之主先酸后辛少陰之主先甘後咸太陰之主先苦後甘佐以所利資以所生是謂得氣帝曰善夫百病之生也皆生於風寒暑濕燥火以之化之變也經言盛者瀉之虛者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪汙工巧神聖可得聞乎岐伯曰審察病機無失氣宜此之謂也帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也帝曰善五味陰陽之用何如岐伯曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道岐伯曰有毒無毒所治為主適大小為制也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者溫之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已帝曰善氣調而得者何如岐伯曰逆之從之逆而從之從而逆之疏氣令調則其道也帝曰善病之中外何如岐伯曰從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外不相及則治主病帝曰善火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相薄盛衰之節瘧亦同法帝曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治岐伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也帝曰善服寒而反熱服熱而反寒其故何也岐伯曰治其王氣是以反也帝曰不治王而然者何也岐伯曰悉乎哉問也不治五味屬也夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也帝曰善方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也帝曰三品何謂岐伯曰所以明善惡之殊貫也帝曰善病之中外何如岐伯曰調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利謹道如法萬舉萬全氣血正平長有天命帝曰善至真要大論熠羊入切焞土渾切膨普盲切痤殂禾切爇如悅切熛匹搖切䐈之力切脆須醉切
