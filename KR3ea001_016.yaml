body:
  text: 卷第十六骨空論篇第六十黃帝問曰余聞風者百病之始也以針治之奈何岐伯對曰風從外入令人振寒汗出頭痛身重惡寒治在風府調其陰陽不足則補有餘則瀉大風頸項痛刺風府風府在上椎大風汗出灸譩嘻譩嘻在背下挾脊旁三寸所厭之令病者呼譩嘻譩嘻應手從風憎風刺眉頭失枕在肩上橫骨間折使揄臂齊肘正灸脊中䏚絡季脅引少腹而痛脹刺譩嘻腰痛不可以轉搖急引陰卵刺八髎與痛上八髎在腰尻分間鼠瘻寒熱還刺寒府寒府在附膝外解營取膝上外者使之拜取足心者使之跪任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目衝脈者起於氣街並少陰之經挾臍上行至胸中而散任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急督脈為病脊強反折督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央此生病從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾督脈生病治督脈治在骨上甚者在臍下營其上氣有音者治其喉中央在缺盆中者其病上衝喉者治其漸漸者上挾頤也蹇膝伸不屈治其楗坐而膝痛治其機立而暑解治其骸關膝痛痛及拇指治其膕坐而膝痛如物隱者治其關膝痛不可屈伸治其背內連䯒若折治陽明中俞髎若別治巨陽少陰滎淫濼脛痠不能久立治少陽之維在外上五寸輔骨上橫骨下為楗挾髖為機膝解為骸關挾膝之骨為連骸骸下為輔輔上為膕膕上為關頭橫骨為枕水俞五十七穴者尻上五行行五伏兔上兩行行五左右各一行行五踝上各一行行六穴髓空在腦後三分在顱際鋭骨之下一在齦基下一在項後中復骨下一在脊骨上空在風府上脊骨下空在尻骨下空數髓空在面挾鼻或骨空在口下當兩肩兩髆骨空在髆中之陽臂骨空在臂陽去踝四寸兩骨空之間股骨上空在股陽出上膝四寸䯒骨空在輔骨之上端股際骨空在毛中動下尻骨空在髀骨之後相去四寸扁骨有滲理湊無髓孔易髓無空灸寒熱之法先灸項大椎以年為壯數次灸橛骨以年為壯數視背俞陷者灸之舉臂肩上陷者灸之兩季脅之間灸之外踝上絶骨之端灸之足小指次指間灸之腨下陷脈灸之外踝後灸之缺盆骨上切之堅痛如筋者灸之膺中陷骨間灸之掌束骨下灸之臍下關元三寸灸之毛際動脈灸之膝下三寸分間灸之足陽明跗上動脈灸之巔上一灸之犬所齧之處灸之三壯即以犬傷病法灸之凡當灸二十九處傷食灸之不已者必視其經之過於陽者數刺其俞而藥之水熱穴論篇第六十一黃帝問曰少陰何以主腎腎何以主水岐伯對曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也帝曰諸水皆生於腎乎岐伯曰腎者牝臟也地氣上者屬於腎而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水所謂玄府者汗空也帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎俞故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也伏兔上各二行行五者此腎之街也三陰之所交結於腳也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴者皆臟之陰絡水之所客也帝曰春取絡脈分肉何也岐伯曰春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間帝曰夏取盛經分腠何也岐伯曰夏者火始治心氣始長脈瘦氣弱陽氣留溢熱熏分腠內至於經故取盛經分腠絶膚而病去者邪居淺也所謂盛經者陽脈也帝曰秋取經俞何也岐伯曰秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合帝曰冬取井滎何也岐伯曰冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去故取井以下陰逆取滎以實陽氣故曰冬取井滎春不鼽衄此之謂也帝曰夫子言治熱病五十九俞餘論其意未能領別其處願聞其處因聞其意岐伯曰頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也帝曰人傷於寒而傳為熱何也岐伯曰夫寒盛則生熱也骨空論髆音博楗音健齧若結切水熱穴論閟音祕菟音兔溜力救切鼷音奚致馳二切
