body:
  text: 卷第五脈要精微論篇第十七黃帝問曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣五臟者中之守也中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死岐伯曰反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格帝曰脈其四時動奈何知病之所在奈何知病之所變奈何知病乍在內奈何知病乍在外奈何請問此五者可得聞乎岐伯曰請言其與天運轉大也萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下以春應中規夏應中矩秋應中衡冬應中權是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失知脈所分分之有期故知死時微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜補瀉勿失與天地如一得一之情以知死生是故聲合五音色合五行脈合陰陽是知陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢豫甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷是故持脈有道虛靜為保春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室故曰知內者按而紀之知外者終而始之此六者持脈之大法心脈搏堅而長當病舌卷不能言其耎而散者當消環自已肺脈搏堅而長當病唾血其耎而散者當病灌汗至令不復散發也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其耎而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也胃脈搏堅而長其色赤當病折髀其耎而散者當病食痹脾脈搏堅而長其色黃當病少氣其耎而散色不澤者當病足䯒腫若水狀也腎脈搏堅而長其色黃而赤者當病折腰其耎而散者當病少血至令不復也帝曰診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也帝曰何以言之岐伯曰心為牡臟小腸為之使故曰少腹當有形也帝曰診得胃脈病形何如岐伯曰胃脈實則脹虛則泄帝曰病成而變何謂岐伯曰風成為寒熱疸成為消中厥成為巔疾久風為飧泄脈風成為癘病之變化不可勝數帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也帝曰治之奈何岐伯曰此四時之病以其勝治之愈也帝曰有故病五臟發動因傷脈色各何以知其久暴至之病乎岐伯曰悉乎哉問也徵其脈小色不奪者新病也徵其脈不奪其色奪者此久病也徵其脈與五色俱奪者此久病也徵其脈與五色俱不奪者新病也肝與腎脈並至其色蒼赤當病毀傷不見血已見血濕若中水也尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥巔疾來徐去疾上虛下實為惡風也故中惡風者陽氣受也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴僕諸浮不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足數動一代者病在陽之脈也泄及便膿血諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒推而外之內而不外有心腹積也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頭項痛也按之至骨脈氣少者腰脊痛而身有痹也平人氣象論篇第十八黃帝問曰平人何如岐伯對曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也常以不病調病人醫不病故為病人平息以調之為法人一呼脈一動一吸脈一動曰少氣人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病藏真散於肝肝藏筋膜之氣也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病藏真通於心心藏血脈之氣也長夏胃微耎弱曰平弱多胃少曰脾病但代無胃曰死耎弱有石曰冬病弱甚曰今病藏真濡於脾脾藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病藏真高於肺以行榮衛陰陽也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病藏真下於腎腎藏骨髓之氣也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也盛喘數絶者則病在中結而橫有積矣絶不至曰死乳之下其動應衣宗氣泄也欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促上擊者曰肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛寸口脈沉而喘曰寒熱脈盛滑堅者曰病在外脈小實而堅者病在內脈小弱以澀謂之久病脈滑浮而疾者謂之新病脈急者曰疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹脈從陰陽病易已脈逆陰陽病難已脈得四時之順曰病無他脈反四時及不間藏曰難已臂多青脈曰脫血尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄脈尺粗常熱者謂之熱中肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見皆死頸脈動喘疾咳曰水目裹微腫如臥蠶起之狀曰水溺黃赤安臥者黃疸已食如飢者胃疸面腫曰風足脛腫曰水目黃者曰黃疸婦人手少陰脈動甚者妊子也脈有逆從四時未有臟形春夏而脈瘦秋冬而脈浮大命曰逆四時也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死平肝脈來耎弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死脈要精微論莠音誘汩古沒切疸都赧切眴音荀又音舜平人氣象論疝音山瘕音賈㑊音亦佇女耕切喙虛畏切
