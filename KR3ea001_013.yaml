body:
  text: 卷第十三病能論篇第四十六黃帝問曰人病胃脘癰者診當何如岐伯對曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也帝曰善人有臥而有所不安者何也岐伯曰臟有所傷及精有所之寄則安故人不能懸其病也帝曰人之不得偃臥者何也岐伯曰肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥論在奇恆陰陽中帝曰有病厥者診右脈沉而緊左脈浮而遲不然病主安在岐伯曰冬診之右脈固當沉緊此應四時左脈浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也帝曰何以言之岐伯曰少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也帝曰善有病頸癰者或石治之或針灸治之而皆已其真安在岐伯曰此同名異等者也夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病異治也帝曰有病怒狂者此病安生岐伯曰生於陽也帝曰陽何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵洛為飲夫生鐵洛者下氣疾也帝曰善有病身熱解惰汗出如浴惡風少氣此為何病岐伯曰病名曰酒風帝曰治之奈何岐伯曰以澤瀉術各十分麋銜五分合以三指撮為後飯所謂深之細者其中手如針也摩之切之聚者堅也博者大也上經者言氣之通天也下經者言病之變化也金匱者決死生也揆度者切度之也奇恆者言奇病也所謂奇者使奇病不得以四時死也恆者得以四時死也所謂揆者方切求之也言切求其脈理也度者得其病處以四時度之也奇病論篇第四十七黃帝問曰人有重身九月而喑此為何也岐伯對曰胞之絡脈絕也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復刺法曰無損不足益有餘以成其疹然後調之所謂無損不足者身羸瘦無用鑱石也無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰疹成也帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也帝曰人有身體髀股䯒皆腫環臍而痛是為何病岐伯曰病名曰伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病也帝曰人有尺脈數甚筋急而見此為何病岐伯曰此所謂疹筋是人腹必急白色黑色見則病甚帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆帝曰善帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾癉夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也帝曰有病口苦取陽陵泉口苦者病名為何何以得之岐伯曰病名曰膽癉夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞治在陰陽十二官相使中帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈微細如髮者此不足也其病安在名為何病岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治此所謂得五有餘二不足也帝曰何謂五有餘二不足岐伯曰所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣帝曰人生而有病顛疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為顛疾也帝曰有病痝然如有水狀切其脈大緊身無痛者形不瘦不能食食少名為何病岐伯曰病生在腎名為腎風腎風而不能食善驚驚已心氣痿者死帝曰善大奇論篇第四十八肝滿腎滿肺滿皆實即為腫肺之雍喘而兩胠滿肝雍兩胠滿臥則驚不得小便腎雍腳下至少腹滿脛有大小髀䯒大跛易偏枯心脈滿大癇瘛筋攣肝脈小急癇瘛筋攣肝脈騖暴有所驚駭脈不至若喑不治自已腎脈小急肝脈小急心脈小急不鼓皆為瘕腎肝並沉為石水並浮為風水並虛為死並小弦欲驚腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝三陽急為瘕三陰急為疝二陰急為癇厥二陽急為驚脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治腎脈小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱見七日死胃脈沉鼓澀胃外鼓大心脈小堅急皆膈偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲起年不滿二十者三歲死脈至而搏血衄身熱者死脈來懸鉤浮為常脈脈至如喘名曰暴厥暴厥者不知與人言脈至如數使人暴驚三四日自已脈至浮合浮合如數一息十至以上是經氣予不足也微見九十日死脈至如火薪然是心精之予奪也草乾而死脈至如散葉是肝氣予虛也木葉落而死脈至如省客省客者脈塞而鼓是腎氣予不足也懸去棗華而死脈至如丸泥是胃精予不足也榆莢落而死脈至如橫格是膽氣予不足也禾熟而死脈至如弦縷是胞精予不足也病善言下霜而死不言可治脈至如交漆交漆者左右旁至也微見三十日死脈至如湧泉浮鼓肌中太陽氣予不足也少氣味韭英而死脈至如頹土之狀按之不得是肌氣予不足也五色先見黑白壘發死脈至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熟寒熱獨並於腎也如此其人不得坐立春而死脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死脈解篇第四十九太陽所謂腫腰脽痛者正月太陽寅寅太陽也正月陽氣出在上而陰氣盛陽未得自次也故腫腰脽痛也病偏虛為跛者正月陽氣凍解地氣而出也所謂偏虛者冬寒頗有不足者故偏虛為跛也所謂強上引背者陽氣大上而爭故強上也所謂耳鳴者陽氣萬物盛上而躍故耳鳴也所謂甚則狂顛疾者陽盡在上而陰氣從下下虛上實故狂顛疾也所謂浮為聾者皆在氣也所謂入中為喑者陽盛已衰故為喑也內奪而厥則為喑俳此腎虛也少陰不至者厥也少陽所謂心脅痛者言少陽盛也盛者心之所表也九月陽氣盡而陰氣盛故心脅痛也所謂不可反側者陰氣藏物也物藏則不動故不可反側也所謂甚則躍者九月萬物盡衰草木畢落而墮則氣去陽而之陰氣盛而陽之下長故謂躍陽明所謂洒洒振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故洒洒振寒也所謂脛腫而股不收者是五月盛陽之陰也陽者衰於五月而一陰氣上與陽始爭故脛腫而股不收也所謂上喘而為水者陰氣下而復上上則邪客於臟腑間故為水也所謂胸痛少氣者水氣在臟腑也水者陰氣也陰氣在中故胸痛少氣也所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也所謂欲獨閉戶牖而處者陰陽相薄也陽盡而陰盛故欲獨閉戶牖而居所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故使之棄衣而走也所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也所謂食則嘔者物盛滿而上溢故嘔也所謂得後與氣則快然如衰者十二月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也所謂色色不能久立久坐起則目䀮䀮無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽內奪故目䀮䀮無所見也所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相薄故恐也所謂惡聞食臭者胃無氣故惡聞食臭也所謂面黑如地色者秋氣內奪故變於色也所謂咳則有血者陽脈傷也陽氣未盛於上而脈滿滿則咳故血見於鼻也厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也所謂㿗癃疝膚脹者曰陰亦盛而脈脹不通故曰㿗癃疝也所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也病能論解音介惰徒臥切撮子括切奇病論鑱鋤銜切疹醜刃切稸音畜大奇論焰弋念切瞥蒲滅切揣初委切脈解論脽音誰
