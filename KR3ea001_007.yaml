body:
  text: 卷第七經脈別論篇第二十一黃帝問曰人之居處動靜勇怯脈亦為之變乎岐伯對曰凡人之驚恐恚勞動靜皆為變也是以夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也故曰診病之道觀人勇怯骨肉皮膚能知其情以為診法也故飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾故春秋冬夏四時陰陽生病起於過用此為常也食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也太陽臟獨至厥喘虛氣逆是陰不足陽有餘也表裡當俱瀉取之下俞陽明臟獨至是陽氣重並也當瀉陽補陰取之下俞少陽臟獨至是厥氣也蹺前卒大取之下俞少陽獨至者一陽之過也太陰臟搏者用心省真五脈氣少胃氣不平三陰也宜治其下俞補陽瀉陰一陽獨嘯少陽厥也陽並於上四脈爭張氣歸於腎宜治其經絡瀉陽補陰一陰至厥陰之治也真虛悁心厥氣留薄發為白汗調食和藥治在下俞帝曰太陽臟何象岐伯曰象三陽而浮也帝曰少陽臟何象岐伯曰象一陽也一陽臟者滑而不實也帝曰陽明臟何象岐伯曰象大浮也太陰臟搏言伏鼓也二陰搏至腎沉不浮也臟氣法時論篇第二十二黃帝問曰合人形以法四時五行而治何如而從何如而逆得失之意願聞其事岐伯對曰五行者金木水火土也更貴更賤以知死生以決成敗而定五臟之氣間甚之時死生之期也帝曰願卒聞之岐伯曰肝主春足厥陰少陽主治其日甲乙肝苦急急食甘以緩之心主夏手少陰太陽主治其日丙丁心苦緩急食酸以收之脾主長夏足太陰陽明主治其日戊己脾苦濕急食苦以燥之肺主秋手太陰陽明主治其日庚辛肺苦氣上逆急食苦以泄之腎主冬足少陰太陽主治其日壬癸腎苦燥急食辛以潤之開腠理致津液通氣也病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春禁當風肝病者愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙肝病者平旦慧下晡甚夜半靜肝欲散急食辛以散之用辛補之酸瀉之病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏禁溫食熱衣心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁心病者日中慧夜半甚平旦靜心欲耎急食鹹以耎之用鹹補之甘瀉之病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己脾病者日昳慧日出甚下晡靜脾欲緩急食甘以緩之用苦瀉之甘補之病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲食寒衣肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛肺病者下晡慧日中甚夜半靜肺欲收急食酸以收之用酸補之辛瀉之病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬禁犯淬㶼熱食溫炙衣腎病者愈在甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸腎病者夜半慧四季甚下晡靜腎欲堅急食苦以堅之用苦補之咸瀉之夫邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起必先定五臟之脈乃可言間甚之時死生之期也肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰頰腫取血者心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺郤中血者脾病者身重善肌肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛辛散酸收甘緩苦堅咸耎毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或耎四時五臟病隨五味所宜也宣明五氣篇第二十三五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒是謂五病五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是謂五液五味所禁辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發五邪所亂邪入於陽則狂邪入於陰則痹搏陽則為巔疾搏陰則為喑陽入之陰則靜陰出之陽則怒是謂五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同命死不治五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志是謂五臟所藏五臟所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷五脈應象肝脈弦心脈鉤脾脈代肺脈毛腎脈石是謂五臟之脈血氣形志篇第二十四夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲然後瀉有餘補不足欲知背俞先度其兩乳間中折之更以他草度去半已即以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也復下一度心之俞也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也是謂五臟之俞灸刺之度也形樂志苦病生於脈治之以灸刺形樂志樂病生於肉治之以針石形苦志樂病生於筋治之以尉引形苦志苦病生於咽嗌治之以百藥形數驚恐經絡不通病生於不仁治之以按摩醪藥是謂五形志也刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出氣惡血刺少陰出氣惡血刺厥陰出血惡氣也經脈別論跌僕音赴罷極上音疲如漚下音甌臟氣法時論慧音惠淬七內切㶼烏開切䀮䀮音荒臑內人朱切宣明五氣篇翕音吸喋音帝窒陡栗切凝泣澀喑讀作音血氣形志篇相柱知庚切扉音鈹
