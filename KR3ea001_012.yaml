body:
  text: 卷第十二風論篇第四十二黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致有風氣也帝曰五臟風之形狀不同者何願聞其診及其病能岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒帝曰善痹論篇第四十三黃帝問曰痹之安生岐伯對曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也帝曰其有五者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也凡痹之客五臟者肺痹者煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痹者夜臥則驚多飲數小便上為引如懷腎痹者善脹尻以代踵脊以代頭脾痹者四肢解惰發咳嘔汁上為大塞腸痹者數飲而出不得中氣喘爭時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾諸痹不已亦益內也其風氣勝者其人易已也帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也岐伯曰此亦其食飲居處為其病本也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也帝曰以針治之奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各隨其過則病瘳也帝曰榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不通皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也帝曰夫痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痹之類逢寒則蟲逢熱則縱帝曰善痿論篇第四十四黃帝問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿帝曰何以得之岐伯曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也帝曰何以別之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽揔宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也帝曰治之奈何岐伯曰各補其滎而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣帝曰善厥論篇第四十五黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也帝曰寒厥之為寒也必從五指而上於膝者何也岐伯曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也帝曰寒厥何失而然也岐伯曰前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也帝曰熱厥何如而然也岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣有衰陽氣獨勝故手足為之熱也帝曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也帝曰善願聞六經脈之厥狀病能也岐伯曰巨陽之厥則腫首頭重足不能行發為眴僕陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言少陽之厥則暴聾頰腫而熱脅痛䯒不可以運太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥則口乾溺赤腹滿心痛厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫䯒內熱盛則瀉之虛則補之不盛不虛以經取之太陰厥逆䯒急攣心痛引腹治主病者少陰厥逆虛滿嘔變下泄清治主病者厥陰厥逆攣腰痛虛滿前閉譫言治主病者三陰俱逆不得前後使人手足寒三日死太陽厥逆僵仆嘔血善衄治主病者少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘咳身熱善驚衄嘔血手太陰厥逆虛滿而咳善嘔沫治主病者手心主少陰厥逆心痛引喉身熱死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手陽明少陽厥逆發喉痹嗌腫痓治主病者風論癘音利潰胡對切腦奴皓切痹論肓音荒痿論躄必亦切髖音寬尻枯熬切揔音總臏音牝厥論譫音詹僵居良切僕音赴髦音毛
