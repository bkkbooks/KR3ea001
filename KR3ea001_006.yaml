body:
  text: 卷第六玉機真臟論篇第十九黃帝問曰春脈如弦何如而弦岐伯對曰春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦反此者病帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中帝曰春脈太過與不及其病皆何如岐伯曰太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿帝曰善夏脈如鉤何如而鉤岐伯曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中帝曰夏脈太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄帝曰善秋脈如浮何如而浮岐伯曰秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中帝曰秋脈太過與不及其病皆何如岐伯曰太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音帝曰善冬脈如營何如而營岐伯曰冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中帝曰冬脈太過與不及其病皆何如岐伯曰太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變帝曰善帝曰四時之序逆從之變異也然脾脈獨何主岐伯曰脾脈者土也孤臟以灌四旁者也帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見帝曰惡者何如可見岐伯曰其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中帝曰夫子言脾為孤臟中央土以灌四旁其太過與不及其病皆何如岐伯曰太過則令人四肢不舉其不及則令人九竅不通名曰重強帝瞿然而起再拜而稽首曰善吾得脈之大要天下至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機至數之要迫近以微著之玉版藏之臟腑每旦讀之名曰玉機五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也黃帝曰五臟相通移皆有次五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死是順傳所勝之次故曰別於陽者知病從來別於陰者知死生之期言知至其所困而死是故風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也或痹不仁腫痛當是之時可湯尉及火灸刺而去之弗治病入舍於肺名曰肺痹發咳上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥弗治腎傳之心病筋脈相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死腎因傳之心心即復反傳而行之肺發寒熱法當三歲死此病之次也然其卒發者不必治於傳或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣此其道也故病有五五五二十五變及其傳化傳乘之名也大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃豫之期日大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死大骨枯稿大肉陷下肩髓內消動作益衰真臟來見期一歲死見其真臟乃豫之期日大骨枯稿大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目匡陷真臟見目不見人立死其見人者至其所不勝之時則死急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期其脈絶不來若人一息五六至其形肉不脫真臟雖不見猶死也真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真臟脈見者皆死不治也黃帝曰見真臟曰死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死帝曰善黃帝曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時未有臟形於春夏而脈沉澀秋冬而脈浮大名曰逆四時也病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治黃帝曰余聞虛實以決死生願聞其情岐伯曰五實死五虛死帝曰願聞五實五虛岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也三部九候論篇第二十黃帝問曰余聞九針於夫子衆多博大不可勝數余願聞要道以屬子孫傳之後世著之骨髓藏之肝肺歃血而受不敢妄泄令合天道必有終始上應天光星辰曆紀下副四時五行貴賤更立冬陰夏陽以人應之奈何願聞其方岐伯對曰妙乎哉問也此天地之至數帝曰願聞天地之至數合於人形血氣通決死生為之奈何岐伯曰天地之至數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾帝曰何謂三部岐伯曰有下部有中部有上部部各有三候三候者有天有地有人也必指而導之乃以為真上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之天以候肝地以候腎人以候脾胃之氣帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣人以候心帝曰上部以何候之岐伯曰亦有天亦有地亦有人天以候頭角之氣地以候口齒之氣人以候耳目之氣三部者各有天各有地各有人三而成天三而成地三而成人三而三之合則為九九分為九野九野為九藏故神藏五形藏四合為九藏五臟已敗其色必夭夭必死矣帝曰以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病以平為期帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆臟相失者死中部之候相減者死目內陷者死帝曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病以左手足上上去踝五寸按之庶右手足當踝而彈之其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死是以脫肉身不去者死中部乍疏乍數者死其脈代而鉤者病在絡脈九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也察其腑臟以知死生之期必先知經脈然後知病脈真臟脈見者勝死足太陽氣絶者其足不可屈伸死必戴眼帝曰冬陰夏陽奈何岐伯曰九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死是故寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾者日乘四季死形肉已脫九候雖調猶死七診雖見九候皆從者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫必審問其所始病與今之所方病而後各切循其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死帝曰其可治者奈何岐伯曰經病者治其經孫絡病者治其孫絡血血病身有痛者治其經絡其病者在奇邪奇邪之脈則繆刺之留瘦不移節而刺之上實下虛切而從之索其結絡脈刺出其血以見通之瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也手指及手外踝上五指留針玉機真臟論溉古代切窳音愈䐃渠殞切瞀莫候切三部九候論歃所甲切飲血也坰古營切蠕而勻切
