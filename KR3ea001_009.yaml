body:
  text: 卷第九熱論篇第三十一黃帝問曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也不知其解願聞其故岐伯對曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已矣帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫言三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死帝曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止刺熱篇第三十二肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽其逆則頭痛員員脈引沖頭也心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得大息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如大豆立已腎熱病者先腰痛䯒痠苦渴數飲身熱熱爭則項痛而強䯒寒且痠足下熱不欲言其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽諸汗者至其所勝日汗出也肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病熱病從部所起者至期而已其刺之反者三周而已重逆則死諸當汗者至其所勝日汗大出也諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也熱病先胸脅痛手足躁刺足少陽補足太陰病甚者為五十九刺熱病始手臂痛者刺手陽明太陰而汗出止熱病始於頭首者刺項太陽而汗出止熱病始於足脛者刺足陽明而汗出止熱病先身重骨痛耳聾好瞑刺足少陰病甚為五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽太陽之脈色榮顴骨熱病也榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎少陽之脈色也少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日熱病氣穴三椎下間主胸中熱四椎下間主膈中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也項上三椎陷者中也頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者膈上也評熱病論篇第三十三黃帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死也帝曰願聞其説岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也帝曰治之奈何岐伯曰表裡刺之飲之服湯帝曰勞風為病何如岐伯曰勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病帝曰治之奈何岐伯曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也帝曰有病腎風者面胕痝然壅害於言可刺不岐伯曰虛不當刺不當刺而刺後五日其氣必至帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳甚病名曰風水論在刺法中帝曰願聞其説岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也不能正偃者胃中不和也正偃則咳甚上迫肺也諸有水氣者微腫先見於目下也帝曰何以言岐伯曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也真氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也諸水病者故不得臥臥則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不下者胃脘隔也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也帝曰善逆調論篇第三十四黃帝問曰人身非常溫也非常熱也為之熱而煩滿者何也岐伯對曰陰氣少而陽氣勝故熱而煩滿也帝曰人身非衣寒也中非有寒氣也寒從中生者何岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出帝曰人有四肢熱逢風寒如炙如火者何也岐伯曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風而如炙如火者是人當肉爍也帝曰人有身寒湯火不能熱厚衣不能溫然不凍栗是為何病岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也帝曰人之肉苛者雖近衣絮猶尚苛也是謂何疾岐伯曰榮氣虛衛氣實也榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死帝曰人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者皆何臟使然願聞其故岐伯曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也帝曰善熱論怫音弗譫之閻切多言也刺熱論頷胡感切灑淅上先禮切下先歷切痠音酸跟音根骶音氐評熱病論胕痝下莫江切髆音博逆調論苛胡歌切
