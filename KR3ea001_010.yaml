body:
  text: 卷第十瘧論篇第三十五黃帝問曰夫痎瘧皆生於風其蓄作有時者何也岐伯對曰瘧之始發也先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲帝曰何氣使然願聞其道岐伯曰陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作帝曰其間日而作者何也岐伯曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也帝曰善其作日晏與其日早者何氣使然岐伯曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也帝曰善夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絕陽氣獨發則少氣煩冤手足熱而欲嘔名曰癉瘧帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說岐伯曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗故為其病逆未可治也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒慄也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復至病之發也如火之熱如風雨不可當也故經言曰方其盛時必毀因其衰也事必大昌此之謂也夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也帝曰善攻之奈何早晏何如岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也帝曰瘧不發其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病也帝曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也瘧者陰陽更勝也或甚或不甚故或渴或不渴帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟岐伯曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧帝曰癉瘧何如岐伯曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰癉瘧帝曰善刺瘧篇第三十六足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺郄中出血足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明跗上足太陰之瘧令人不樂好大息不嗜食多寒熱汗出病至則善嘔嘔已乃衰即取之足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺足厥陰肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰腎瘧者令人洒洒然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰胃瘧者令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血瘧發身方熱刺跗上動脈開其空出其血立寒瘧方欲寒刺手陽明太陰足陽明太陰瘧脈滿大急刺背俞用中針旁伍胠俞各一適肥瘦出其血也瘧脈小實急灸脛少陰刺指井瘧脈滿大急刺背俞用五胠俞背俞各一適行至於血也瘧脈緩大虛便宜用藥不宜用針凡治瘧先發如食頃乃可以治過之則失時也諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之十二瘧者其發各不同時察其病形以知其何脈之病也先其發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血不已刺郄中盛經出血又刺項以下俠脊者必已舌下兩脈者廉泉也刺瘧者必先問其病之所先發者先刺之先頭痛及重者先刺頭上及兩額兩眉間出血先項背痛者先刺之先腰脊痛者先刺郄中出血先手臂痛者先刺手少陰陽明十指間先足脛痠痛者先刺足陽明十指間出血風瘧瘧發則汗出惡風刺三陽經背俞之血者䯒痠痛甚按之不可名曰胕髓病以鑱針針絕骨出血立已身體小痛刺至陰諸陰之井無出血間日一刺瘧不渴間日而作刺足太陽渴而間日作刺足少陽溫瘧汗不出為五十九刺氣厥論篇第三十七黃帝問曰五臟六腑寒熱相移者何岐伯曰腎移寒於肝癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂隔中心移寒於肺肺消肺消者飲一溲二死不治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為膈消肺移熱於腎傳為柔痓腎移熱於脾傳為虛腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸膈腸不便上為口麋小腸移熱於大腸為虙瘕為沉大腸移熱於胃善食而瘦入謂之食亦胃移熱於膽亦曰食亦膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄蔑瞑目故得之氣厥也咳論篇第三十八黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地相參故五臟各以治時感於寒則受病微則為咳甚者為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之帝曰何以異之岐伯曰肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎帝曰六腑之咳奈何安所受病岐伯曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺失心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也帝曰治之奈何岐伯曰治臟者治其俞治腑者治其合浮腫者治其經帝曰善瘧論熇火沃切漉音鹿弭綿婢切刺瘧論暍音謁悒於急切眴音舜氣厥論痓音熾麋武悲切虙音復蔑莫結切咳論蛔音回
