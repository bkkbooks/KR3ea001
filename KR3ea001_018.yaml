body:
  text: 卷第十八繆刺論篇第六十三黃帝問曰余聞繆刺未得其意何謂繆刺岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之岐伯曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也故絡病者其痛與經脈繆處故命曰繆刺帝曰願聞繆刺奈何取之何如岐伯曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然骨之前出血如食頃而已不已左取右右取左病新發者取五日已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一痏壯者立已老者有頃已左取右右取左此新病數日已邪客於足厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項肩痛刺足小指爪甲上與肉交者各一痏立已不已刺外踝下三痏左取右右取左如食頃已邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已邪客於臂掌之間不可得屈刺其踝後先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏邪客於足陽蹺之脈令人目痛從內眥始刺外踝之下半寸所各二痏左刺右右刺左如行十里頃而已人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然骨之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血立已左刺右右刺左善悲驚不樂刺如右方邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上去端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數左刺右右刺左凡痹往來行無常處者在分肉間痛而刺之以月死生為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及日數則氣不瀉左刺右右刺左病已止不已復刺之如法月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之邪客於足陽明之經令人鼽衄上齒寒刺足中指次指爪甲上與肉交者各一痏左刺右右刺左邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小指次指爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上刺足下中央之脈各三痏凡六刺立已左刺右右刺左嗌中腫不能內唾時不能出唾者繆刺然骨之前出血立已左刺右右刺左邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息刺腰尻之解兩胂之上是腰俞以月死生為痏數髮針立已左刺右右刺左邪客於足太陽之絡令人拘攣背急引脅而痛刺之從項始數脊椎挾脊疾按之應手如痛刺之旁三痏立已邪客於足少陽之絡令人留於樞中痛髀不可舉刺樞中以毫針寒則久留針以月死生為數立已治諸經刺之所過者不病則繆刺之耳聾刺手陽明不已刺其通脈出耳前者齒齲刺手陽明不已刺其脈入齒中立已邪客於五臟之間其病也脈引而痛時來時止視其病繆刺之於手足爪甲上視其脈出其血間日一刺一刺不已五刺已繆傳引上齒齒唇寒痛視其手背脈血者去之足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若屍或曰屍厥刺其足大指內側爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰銳骨之端各一痏立已不已以竹管吹其兩耳鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之有痛而經不病者繆刺之因視其皮部有血絡者盡取之此繆刺之數也四時刺逆從論篇第六十四厥陰有餘病陰痹不足病生熱痹滑則病狐疝風澀則病少腹積氣少陰有餘病皮痹隱軫不足病肺痹滑則病肺風疝澀則病積溲血太陰有餘病肉痹寒中不足病脾痹滑則病脾風疝澀則病積心腹時滿陽明有餘病脈痹身時熱不足病心痹滑則病心風疝澀則病積時善驚太陽有餘病骨痹身重不足病腎痹滑則病腎風疝澀則病積善時巔疾少陽有餘病筋痹脅滿不足病肝痹滑則病肝風疝澀則病積時筋急目痛是故春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中帝曰余願聞其故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢入孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生帝曰逆四時而生亂氣奈何岐伯曰春刺絡脈血氣外溢令人少氣春刺肌肉血氣環逆令人上氣春刺筋骨血氣內著令人腹脹夏刺經脈血氣乃竭令人解㑊夏刺肌肉血氣內卻令人善恐夏刺筋骨血氣上逆令人善怒秋刺經脈血氣上逆令人善忘秋刺絡脈氣不外行令人臥不欲動秋刺筋骨血氣內散令人寒慄冬刺經脈血氣皆脫令人目不明冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絕令人善忘凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉故刺不知四時之經病之所生以從為逆正氣內亂與精相薄必審九候正氣不亂精氣不轉帝曰善刺五臟中心一日死其動為噫中肝五日死其動為語中肺三日死其動為咳中腎六日死其動為嚏欠中脾十日死其動為吞刺傷人五臟必死其動則依其臟之所變候知其死也標本病傳論篇第六十五黃帝問曰病有標本刺有逆從奈何岐伯對曰凡刺之方必別陰陽前後相應逆從得施標本相移故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆與從正行無問知標本者萬舉萬當不知標本是謂妄行夫陰陽逆從標本之為道也小而大言一而知百病之害少而多淺而博可以言一而知百也以淺而知深察近而知遠言標與本易而勿及治反為逆治得為從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣小大不利治其標小大利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹察間甚以意調之間者並行甚者獨行先小大不利而後生病者治其本夫病傳者心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死冬夜半夏日中肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛痠三日不已死冬日入夏早食脾病身痛體重一日而脹二日少腹腰脊痛脛痠三日背𦛗筋痛小便閉十日不已死冬人定夏晏食腎病少腹腰脊痛䯒痠三日背𦛗筋痛小便閉三日腹脹三日兩脅支痛三日不已死冬大晨夏晏晡胃病脹滿五日少腹腰脊痛䯒痠三日背𦛗筋痛小便閉五日身體重六日不已死冬夜半後夏日昳膀胱病小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺間一臟止及至三四臟者乃可刺也
