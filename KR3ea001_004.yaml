body:
  text: 卷第四異法方宜論篇第十二黃帝問曰醫之治病也一病而治各不同皆愈何也岐伯對曰地勢使然也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石者亦從東方來西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦其民華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食臟寒生滿病其治宜灸爇故灸爇者亦從北方來南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來中央者其地平以濕天地所以生萬物也衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺故導引按蹺者亦從中央出也故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大體也移精變氣論篇第十三黃帝問曰余聞古之治病惟其移精變氣可祝由而已今世治病毒藥治其內針石治其外或愈或不愈何也岐伯對曰往古人居禽獸之間動作以避寒陰居以避暑內無眷慕之纍外無伸宦之形此恬憺之世邪不能深入也故毒藥不能治其內針石不能治其外故可移精祝由而已當今之世不然憂患緣其內苦形傷其外又失四時之從逆寒暑之宜賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚所以小病必甚大病必死故祝由不能已也帝曰善余欲臨病人觀死生決嫌疑欲知其要如日月光可得聞乎岐伯曰色脈者上帝之所貴也先師之所傳也上古使僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常變化相移以觀其妙以知其要欲知其要則色脈是矣色以應日脈以應月常求其要則其要也夫色之變化以應四時之脈此上帝之所貴以合於神明也所以遠死而近生生道以長命曰聖王中古之治病至而治之湯液十日以去八風五痹之病十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服暮世之治病也則不然治不本四時不知日月不審逆從病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻故病未已新病復起帝曰願聞要道岐伯曰治之要極無失色脈用之不惑治之大則逆從倒行標本不得亡神失國去故就新乃得真人帝曰余聞其要於夫子矣夫子言不離色脈此余之所知也岐伯曰治之極於一帝曰何謂一岐伯曰一者因得之帝曰奈何岐伯曰閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡帝曰善湯液醪醴論篇第十四黃帝問曰為五穀湯液及醪醴奈何岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅帝曰何以然岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也帝曰上古聖人作湯液醪醴為而不用何也岐伯曰自古聖人之作湯液醪醴者以為備耳夫上古作湯液故為而弗服也中古之世道德稍衰邪氣時至服之萬全帝曰今之世不必已何也岐伯曰當今之世必齊毒藥攻其中鑱石針艾治其外也帝曰形弊血盡而功不立者何岐伯曰神不使也帝曰何謂神不使岐伯曰針石道也精神不進志意不治故病不可愈今精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精氣弛壞榮泣衛除故神去之而病不愈也帝曰夫病之始生也極微極精必先入結於皮膚今良工皆稱曰病成名曰逆則針石不能治良藥不能及也今良工皆得其法守其數親戚兄弟遠近音聲日聞於耳五色日見於目而病不愈者亦何暇不早乎岐伯曰病為本工為標標本不得邪氣不服此之謂也帝曰其有不從毫毛而生五臟陽以竭也津液充郭其魄獨居精孤於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外治之奈何岐伯曰平治於權衡去宛陳莝微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平帝曰善玉版論要篇第十五黃帝問曰余聞揆度奇恆所指不同用之奈何岐伯對曰揆度者度病之淺深也奇恆者言奇病也請言道之至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機至數之要迫近以微著之玉版命曰合玉機容色見上下左右各在其要其色見淺者湯液主治十日已其見深者必齊主治二十一日已其見大深者醪酒主治百日已色夭面脫不治百日盡已脈短氣絶死病溫虛甚死色見上下左右各在其要上為逆下為從女子右為逆左為從男子左為逆右為從易重陽死重陰死陰陽反他治在權衡相奪奇恆事也揆度事也搏脈痹躄寒熱之交脈孤為消氣虛泄為奪血孤為逆虛為從行奇恆之法以太陰始行所不勝曰逆逆則死行所勝曰從從則活八風四時之勝終而復始逆行一過不復可數論要畢矣診要經終論篇第十六黃帝問曰診要何如岐伯對曰正月二月天氣始方地氣始發人氣在肝三月四月天氣正方地氣定發人氣在脾五月六月天氣盛地氣高人氣在頭七月八月陰氣始殺人氣在肺九月十月陰氣始冰地氣始閉人氣在心十一月十二月冰復地氣合人氣在腎故春刺散俞及與分理血出而止甚者傳氣間者環也夏刺絡俞見血而止盡氣閉環痛病必下秋刺皮膚循理上下同法神變而止冬刺俞竅於分理甚者直下間者散下春夏秋冬各有所刺法其所在春刺夏分脈亂氣微入淫骨髓病不能愈令人不嗜食又且少氣春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且哭春刺冬分邪氣著藏令人脹病不愈又且欲言語夏刺春分病不愈令人解惰夏刺秋分病不愈令人心中欲無言惕惕如人將捕之夏刺冬分病不愈令人少氣時欲怒秋刺春分病不已令人惕然欲有所為起而忘之秋刺夏分病不已令人益嗜臥又且善夢秋刺冬分病不已令人灑灑時寒冬刺春分病不已令人欲臥不能眠眠而有見冬刺夏分病不愈氣上發為諸痹冬刺秋分病不已令人善渴凡刺胸腹者必避五臟中心者環死中脾者五日死中腎者七日死中肺者五日死中膈者皆為傷中其病雖愈不過一歲必死刺避五臟者知逆從也所謂從者膈與脾腎之處不知者反之刺胸腹者必以布憿著之乃從單布上刺刺之不愈復刺刺針必肅刺腫搖針經刺勿搖此刺之道也帝曰願聞十二經脈之終奈何岐伯曰太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣此十二經之所敗也異法方宜論蹺巨嬌切砭普廉切致直利切移精變氣論荄古哀切草根也標必堯切湯液醪醴論音勞莝音銼斬也滌音迪穢音畏玉版論度徒各切躄必益切診要經終論憿古堯切瘲音縱睘音瓊睒音閃跗音夫
