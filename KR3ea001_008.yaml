body:
  text: 卷第八寶命全形論篇第二十五黃帝問曰天覆地載萬物悉備莫貴於人人以天地之氣生四時之法成君王眾庶盡欲全形形之疾病莫知其情留淫日深著於骨髓心私慮之余欲針除其疾病為之奈何岐伯對曰夫鹽之味鹹者其氣令器津泄弦絕者其音嘶敗木敷者其葉發病深者其聲噦人有此三者是謂壞府毒藥無治短針無取此皆絕皮傷肉血氣爭黑帝曰余念其痛心為之亂惑反甚其病不可更代百姓聞之以為殘賊為之奈何岐伯曰夫人生於地懸命於天天地合氣命之曰人人能應四時者天地為之父母知萬物者謂之天子天有陰陽人有十二節天有寒暑人有虛實能經天地陰陽之化者不失四時知十二節之理者聖智不能欺也能存八動之變五勝更立能達虛實之數者獨出獨入呿吟至微秋毫在目帝曰人生有形不離陰陽天地合氣別為九野分為四時月有小大日有短長萬物並至不可勝量虛實呿吟敢問其方岐伯曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絕萬物盡然不可勝竭故針有懸布天下者五黔首共餘食莫知之也一曰治神二曰知養身三曰知毒藥為真四曰制砭石小大五曰知腑臟血氣之診五法俱立各有所先今末世之刺也虛者實之滿者泄之此皆眾工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往帝曰願聞其道岐伯曰凡刺之真必先治神五臟已定九候已備後乃存針眾脈不見眾凶弗聞外內相得無以形先可玩往來乃施於人人有虛實五虛勿近五實勿遠至其當發間不容瞚手動若務針耀而勻靜意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如橫弩起如發機帝曰何如而虛何如而實岐伯曰刺實者須其虛刺虛者須其實經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於眾物八正神明論篇第二十六黃帝問曰用針之服必有法則焉今何法何則岐伯對曰法天則地合以天光帝曰願卒聞之岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺天溫無疑月生無瀉月滿無補月郭空無治是謂得時而調之因天之序盛虛之時移光定位正立而待之故曰月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血命曰重實月郭空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起帝曰星辰八正何候岐伯曰星辰者所以制日月之行也八正者所以候八風之虛邪以時至者也四時者所以分春秋冬夏之氣所在以時調之候八正之虛邪而避之勿犯也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之弗能傷也故曰天忌不可不知也帝曰善其法星辰者余聞之矣願聞法往古者岐伯曰法往古者先知針經也驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也觀於冥冥者言形氣榮衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉通於無窮者可以傳於後世也是故工之所以異也然而不形見於外故俱不能見也視之無形嘗之無味故謂冥冥若神彷彿虛邪者八正之虛邪氣也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形上工救其萌牙必先見三部九候之氣盡調不敗而救之故曰上工下工救其已成救其已敗救其已成者言不知三部九候之相失因病而敗之也知其所在者知診三部九候之病脈處而治之故曰守其門戶焉莫知其情而見邪形也帝曰余聞補瀉未得其意岐伯曰瀉必用方方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而內針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣乃行焉補必用員員者行也行者移也刺必中其榮復以吸排針也故員與方非針也故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養帝曰妙乎哉論也合人形於陰陽四時虛實之應冥冥之期其非夫子孰能通之然夫子數言形與神何謂形何謂神願卒聞之岐伯曰請言形形乎形目冥冥問其所病索之於經慧然在前按之不得不知其情故曰形帝曰何謂神岐伯曰請言神神乎神耳不聞目明心開而志先慧然獨悟口弗能言俱視獨見適若昏昭然獨明若風吹雲故曰神三部九候為之原九針之論不必存也離合真邪論篇第二十七黃帝問曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣經言氣之盛衰左右傾移以上調下以左調右有餘不足補瀉於滎輸余知之矣此皆榮衛之傾移虛實之所生非邪氣從外入於經也余願聞邪氣之在經也其病人何如取之奈何岐伯對曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脈天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度從而察之三部九候卒然逢之早遏其路吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉帝曰不足者補之奈何岐伯曰必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補帝曰候氣奈何岐伯曰夫邪去絡入於經也舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在故曰方其來也必按而止之止而取之無逢其沖而瀉之真氣者經氣也經氣太虛故曰其來不可逢此之謂也故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也不可掛以發者待邪之至時而髮針瀉矣若先若後者血氣已盡其病不可下故曰知其可取如發機不知其取如扣椎故曰知機道者不可掛以發不知機者扣之不發此之謂也帝曰補瀉奈何岐伯曰此攻邪也疾出以去盛血而復其真氣此邪新客溶溶未有定處也推之則前引之則止逆而刺之溫血也刺出其血其病立已帝曰善然真邪以合波隴不起候之奈何岐伯曰審捫循三部九候之盛虛而調之察其左右上下相失及相減者審其病臟以期之不知三部者陰陽不別天地不分地以候地天以候天人以候人調之中府以定三部故曰刺不知三部九候病脈之處雖有大過且至工不能禁也誅罰無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣以從為逆榮衛散亂真氣已失邪獨內著絕人長命予人天殃不知三部九候故不能久長因不知合之四時五行因加相勝釋邪攻正絕人長命邪之新客來也未有定處推之則前引之則止逢而瀉之其病立已通評虛實論篇第二十八黃帝問曰何謂虛實岐伯對曰邪氣盛則實精氣奪則虛帝曰虛實何如岐伯曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死餘臟皆如此帝曰何謂重實岐伯曰所謂重實者言大熱病氣熱脈滿是謂重實帝曰經絡俱實何如何以治之岐伯曰經絡皆實是寸脈急而尺緩也皆當治之故曰滑則從澀則逆也夫虛實者皆從其物類始故五臟骨肉滑利可以長久也帝曰絡氣不足經氣有餘何如岐伯曰絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆春夏為從治主病者帝曰經虛絡滿何如岐伯曰經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也帝曰治此者奈何岐伯曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽帝曰何謂重虛岐伯曰脈氣上虛尺虛是謂重虛帝曰何以治之岐伯曰所謂氣虛者言無常也尺虛者行步恇然脈虛者不象陰也如此者滑則生澀則死也帝曰寒氣暴上脈滿而實何如岐伯曰實而滑則生實而逆則死帝曰脈實滿手足寒頭熱何如岐伯曰春秋則生冬夏則死脈浮而澀澀而身有熱者死帝曰其形盡滿何如岐伯曰其形盡滿者脈急大堅尺澀而不應也如是者故從則生逆則死帝曰何謂從則生逆則死岐伯曰所謂從者手足溫也所謂逆者手足寒也帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死帝曰腸澼便血何如岐伯曰身熱則死寒則生帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死帝曰腸澼下膿血何如岐伯曰脈懸絕則死滑大則生帝曰腸澼之屬身不熱脈不懸絕何如岐伯曰滑大者曰生懸澀者曰死以臟期之帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死帝曰消癉虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治帝曰形度骨度脈度筋度何以知其度也帝曰春亟治經絡夏亟治經俞秋亟治六腑冬則閉塞閉塞者用藥而少針石也所謂少針石者非癰疽之謂也癰疽不得頃時回癰不知所按之不應手乍來乍已刺手太陰旁三痏與纓脈各二掖癰大熱刺足少陽五刺而熱不止刺手心主三刺手太陰經絡者大骨之會各三暴癰筋緛隨分而痛魄汗不盡胞氣不足治在經俞腹暴滿按之不下取手太陽經絡者胃之募也少陰俞去脊椎三寸旁五用員利針霍亂刺俞旁五足陽明及上旁三刺癇驚脈五針手太陰各五刺經太陽五刺手少陰經絡旁者一足陽明一上踝五寸刺三針凡治消癉僕擊偏枯痿厥氣滿發逆甘肥貴人則高梁之疾也隔塞閉絕上下不通則暴憂之病也暴厥而聾偏塞閉不通內氣暴薄也不從內外中風之病故瘦留著也蹠跛寒風濕之病也黃帝曰黃疸暴痛癲疾厥狂久逆之所生也五臟不平六腑閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也太陰陽明論篇第二十九黃帝問曰太陰陽明為表裡脾胃脈也生病而異者何也岐伯對曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也帝曰願聞其異狀也岐伯曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也帝曰脾與胃以膜相連耳而能為之行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉陽明脈解篇第三十黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚何也願聞其故岐伯對曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也帝曰善其惡火何也岐伯曰陽明主肉其脈血氣盛邪客之則熱熱甚則惡火帝曰其惡人何也岐伯曰陽明厥則喘而惋惋則惡人帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生帝曰善病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也帝曰其棄衣而走者何也岐伯曰熱盛於身故棄衣欲走也帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也寶命全形論嗄所嫁切呿吟上丘伽切黔音鉗棄蔑音滅容瞚音舜八正神明論彷彿上音仿下音弗離合真邪論輴徐倫切蚊虻武庚切捫音門抓側交切溶音容通評虛實論恇去王切痏榮美切蹠之石切太陰陽明論閉塞蘇則切陽明脈解篇惋烏貫切逾音於
