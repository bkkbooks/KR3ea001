body:
  text: 卷第十九天元紀大論篇第六十六黃帝問曰天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐論言五運相襲而皆治之終期之日周而復始余已知之矣願聞其與三陰三陽之候奈何合之鬼臾區稽首再拜對曰昭乎哉問也夫五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖夫變化之為用也在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形形氣相感而化生萬物矣然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之終始也氣有多少形有盛衰上下相召而損益彰矣帝曰願聞五運之主時也何如鬼臾區曰五氣運行各終期日非獨主時也帝曰請聞其所謂也鬼臾區曰臣積考太始天元冊文曰太虛寥廓肇基化元萬物資始五運終天布氣真靈揔統坤元九星懸朗七曜周旋曰陰曰陽曰柔曰剛幽顯既位寒暑弛張生生化化品物咸章臣斯十世此之謂也帝曰善何謂氣有多少形有盛衰鬼臾區曰陰陽之氣各有多少故曰三陰三陽也形有盛衰謂五行之治各有太過不及也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期應天為天符承歲為歲直三合為治帝曰上下相召奈何鬼臾區曰寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水火地之陰陽也生長化收藏下應之天以陽生陰長地以陽殺陰藏天有陰陽地亦有陰陽木火土金水火地之陰陽也生長化收藏故陽中有陰陰中有陽所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會動靜相召上下相臨陰陽相錯而變由生也帝曰上下周紀其有數乎鬼臾區曰天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周君火以明相火以位五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣帝曰夫子之言上終天氣下畢地紀可謂悉矣余願聞而藏之上以治民下以治身使百姓昭著上下和親德澤下流子孫無憂傳之後世無有終時可得聞乎鬼臾區曰至數之機迫迮以微其來可見其往可追敬之者昌慢之者亡無道行私必得夭殃謹奉天道請言真要帝曰善言始者必會於終善言近者必知其遠是則至數極而道不惑所謂明矣願夫子推而次之令有條理簡而不匱久而不絕易用難忘為之綱紀至數之要願盡聞之鬼臾區曰昭乎哉問明乎哉道如鼓之應桴響之應聲也臣聞之甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之帝曰其於三陰三陽合之奈何鬼臾區曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元帝曰光乎哉道明乎哉論請著之玉版藏之金匱署曰天元紀五運行大論篇第六十七黃帝坐明堂始正天綱臨觀八極考建五常請天師而問之曰論言天地之動靜神明為之紀陰陽之升降寒暑彰其兆余聞五運之數於夫子夫子之所言正五氣之各主歲爾首甲定運余因論之鬼臾區曰土主甲己金主乙庚水主丙辛木主丁壬火主戊癸子午之上少陰主之丑未之上太陰主之寅申之上少陽主之卯酉之上陽明主之辰戌之上太陽主之巳亥之上厥陰主之不合陰陽其故何也岐伯曰是明道也此天地之陰陽也夫數之可數者人中之陰陽也然所合數之可得者也夫陰陽者數之可十推之可百數之可千推之可萬天地陰陽者不以數推以象之謂也帝曰願聞其所始也岐伯曰昭乎哉問也臣覽太始天元冊文丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐昴畢玄天之氣經於張翼婁胃所謂戊己分者奎壁角軫則天地之門戶也夫候之所始道之所生不可不通也帝曰善論言天地者萬物之上下左右者陰陽之道路未知其所謂也岐伯曰所謂上下者歲上下見陰陽之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也帝曰何謂下岐伯曰厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也上下相遘寒暑相臨氣相得則和不相得則病帝曰氣相得而病者何也岐伯曰以下臨上不當位也帝曰動靜何如岐伯曰上者右行下者左行左右周天余而復會也帝曰余聞鬼臾區曰應地者靜今夫子乃言下者左行不知其所謂也願聞何以生之乎岐伯曰天地動靜五行遷復雖鬼臾區其上候而已猶不能遍明夫變化之用天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也帝曰地之為下否乎岐伯曰地為人之下太虛之中者也帝曰馮乎岐伯曰大氣舉之也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故風寒在下燥熱在上濕氣在中火遊行其間寒暑六入故令虛而生化也故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣帝曰天地之氣何以候之岐伯曰天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也帝曰間氣何如岐伯曰隨氣所在期於左右帝曰期之奈何岐伯曰從其氣則和違其氣則病不當其位者病迭移其位者病失守其位者危尺寸反者死陰陽交者死先立其年以知其氣左右應見然後乃可以言死生之逆順帝曰寒暑燥濕風火在人合之奈何其於萬物何以生化岐伯曰東方生風風生木木生酸酸生肝肝生筋筋生心其在天為玄在人為道在地為化化生五味道生智玄生神化生氣神在天為風在地為木在體為筋在氣為柔在臟為肝其性為暄其德為和其用為動其色為蒼其化為榮其蟲毛其政為散其令宣發其變摧拉其眚為隕其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸南方生熱熱生火火生苦苦生心心生血血生脾其在天為熱在地為火在體為脈在氣為息在臟為心其性為暑其德為顯其用為躁其色為赤其化為茂其蟲羽其政為明其令鬱蒸其變炎爍其眚燔焫其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦中央生濕濕生土土生甘甘生脾脾生肉肉生肺其在天為濕在地為土在體為肉在氣為充在臟為脾其性靜兼其德為濡其用為化其色為黃其化為盈其蟲倮其政為謐其令雲雨其變動注其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎其在天為燥在地為金在體為皮毛在氣為成在臟為肺其性為涼其德為清其用為固其色為白其化為斂其蟲介其政為勁其令霧露其變肅殺其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝其在天為寒在地為水在體為骨在氣為堅在臟為腎其性為凜其德為寒其用為其色為黑其化為肅其蟲鱗其政為靜其令其變凝冽其眚冰雹其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸五氣更立各有所先非其位則邪當其位則正帝曰病生之變何如岐伯曰氣相得則微不相得則甚帝曰主歲何如岐伯曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之侮反受邪侮而受邪寡於畏也帝曰善六微旨大論篇第六十八黃帝問曰嗚呼遠哉天之道也如迎浮雲若視深淵視深淵尚可測迎浮雲莫知其極夫子數言謹奉天道余聞而藏之心私異之不知其所謂也願夫子溢志盡言其事令終不滅久而不絕天之道可得聞乎岐伯稽首再拜對曰明乎哉問天之道也此因天之序盛衰之時也帝曰願聞天道六六之節盛衰何也岐伯曰上下有位左右有紀故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待也故曰因天之序盛衰之時移光定位正立而待之此之謂也少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也本標不同氣應異象帝曰其有至而至有至而不至有至而太過何也岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也帝曰至而不至未至而至如何岐伯曰應則順否則逆逆則變生變則病帝曰善請言其應岐伯曰物生其應也氣脈其應也帝曰善願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之帝曰何也岐伯曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病帝曰盛衰何如岐伯曰非其位則邪當其位則正邪則變甚正則微帝曰何謂當位岐伯曰木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也帝曰非位何如岐伯曰歲不與會也帝曰土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽奈何岐伯曰天之與會也故天元冊曰天符天符歲會何如岐伯曰太一天符之會也帝曰其貴賤何如岐伯曰天符為執法歲位為行令太一天符為貴人帝曰邪之中也奈何岐伯曰中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死帝曰位之易也何如岐伯曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也帝曰善願聞其步何如岐伯曰所謂步者六十度而有奇故二十四步積盈百刻而成日也帝曰六氣應五行之變何如岐伯曰位有終始氣有初中上下不同求之亦異也帝曰求之奈何岐伯曰天氣始於甲地氣治於子子甲相合命曰歲立謹候其時氣可與期帝曰願聞其歲六氣始終早晏何如岐伯曰明乎哉問也甲子之歲初之氣天數始於水下一刻終於八十七刻半二之氣始於八十七刻六分終於七十五刻三之氣始於七十六刻終於六十二刻半四之氣始於六十二刻六分終於五十刻五之氣始於五十一刻終於三十七刻半六之氣始於三十七刻六分終於二十五刻所謂初六天之數也乙丑歲初之氣天數始於二十六刻終於一十二刻半二之氣始於一十二刻六分終於水下百刻三之氣始於一刻終於八十七刻半四之氣始於八十七刻六分終於七十五刻五之氣始於七十六刻終於六十二刻半六之氣始於六十二刻六分終於五十刻所謂六二天之數也丙寅歲初之氣天數始於五十一刻終於三十七刻半二之氣始於三十七刻六分終於二十五刻三之氣始於二十六刻終於一十二刻半四之氣始於一十二刻六分終於水下百刻五之氣始於一刻終於八十七刻半六之氣始於八十七刻六分終於七十五刻所謂六三天之數也丁卯歲初之氣天數始於七十六刻終於六十二刻半二之氣始於六十二刻六分終於五十刻三之氣始於五十一刻終於三十七刻半四之氣始於三十七刻六分終於二十五刻五之氣始於二十六刻終於一十二刻半六之氣始於一十二刻六分終於水下百刻所謂六四天之數也次戊辰歲初之氣復始於一刻常如是無已周而復始帝曰願聞其歲候何如岐伯曰悉於哉問也日行一周天氣始於一刻日行再周天氣始於二十六刻日行三周天氣始於五十一刻日行四周天氣始於七十六刻日行五周天氣復始於一刻所謂一紀也是故寅午戌歲氣會同卯未亥歲氣會同辰申子歲氣會同巳酉醜歲氣會同終而復始帝曰願聞其用也岐伯曰言天者求之本言地者求之位言人者求之氣交帝曰何謂氣交岐伯曰上下之位氣交之中人之居也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之此之謂也帝曰何謂初中岐伯曰初凡三十度而有奇中氣同法帝曰初中何也岐伯曰所以分天地也帝曰願卒聞之岐伯曰初者地氣也中者天氣也帝曰其升降何如岐伯曰氣之升降天地之更用也帝曰願聞其用何如岐伯曰升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣帝曰善寒濕相遘燥熱相臨風火相值其有間乎岐伯曰氣有勝復勝復之作有德有化有用有變變則邪氣居之帝曰何謂邪乎岐伯曰夫物之生從於化物之極由乎變變化之相薄成敗之所由也故氣有往復用有遲速四者之有而化而變風之來也帝曰遲速往復風所由生而化而變故因盛衰之變耳成敗倚伏遊乎中何也岐伯曰成敗倚伏生乎動動而不已則變作矣帝曰有期乎岐伯曰不生不化靜之期也帝曰不生化乎岐伯曰出入廢則神機化滅升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長化收藏是以升降出入無器不有故器者生化之宇器散則分之生化息矣故無不出入無不升降化有小大期有近遠四者之有而貴常守反常則災害至矣故曰無形無患此之謂也帝曰善有不生不化乎岐伯曰悉乎哉問也與道合同惟真人也帝曰善天元紀大論鐫子泉切五運行大論憑扶冰切礙音艾倮音畫眚所景切嵸音揔蹔慈濫切溽音辱黅音今銛音括疚音救六微旨大論霪音淫霔音注涸胡各切蚑音祁埏式連切
